name: Deploy Hugo Site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.163.3'
          extended: true

      - name: Install dependencies
        run: npm install

      - name: Build Hugo
        run: hugo --gc

      - name: Build Pagefind index
        run: |
          echo "=== Before pagefind: public/ files ==="
          find public/ -type f | head -20
          echo ""
          echo "=== Running pagefind ==="
          npx pagefind --site public --verbose 2>&1
          echo ""
          echo "=== After pagefind: pagefind/ dir ==="
          ls -la public/pagefind/
          echo ""
          echo "=== pagefind fragment/ files ==="
          find public/pagefind/fragment/ -type f | head -10
          echo ""
          echo "=== pagefind index/ files ==="
          find public/pagefind/index/ -type f | head -10
          echo ""
          echo "=== Count all files in public/pagefind/ ==="
          find public/pagefind/ -type f | wc -l

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
          retention-days: 1

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
