<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - 龙兄知识库</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  /* Page-specific 404 styles */
  .dragon-svg {
    width: 120px;
    height: 120px;
    opacity: 0.6;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }

  .error-page .error-code {
    font-size: 10rem;
    background: linear-gradient(135deg, var(--gold), var(--blue-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .cloud-deco {
    position: absolute;
    font-size: 2rem;
    opacity: 0.15;
    color: var(--gold);
  }

  .cloud-1 { top: 15%; left: 10%; animation: float 4s ease-in-out infinite; }
  .cloud-2 { top: 25%; right: 12%; animation: float 5s ease-in-out infinite 0.5s; }
  .cloud-3 { bottom: 30%; left: 15%; animation: float 3.5s ease-in-out infinite 1s; }
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="logo">龙兄知识库</a>
    <button class="hamburger" aria-label="菜单">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links">
      <li><a href="index.html">首页</a></li>
      <li><a href="agarwood.html">AI学习</a></li>
      <li><a href="tesla.html">生活百科</a></li>
      <li><a href="tools.html">工具箱</a></li>
      <li><a href="travel.html">旅行</a></li>
    </ul>
  </div>
</nav>
<div class="mobile-nav">
  <a href="index.html">首页</a>
  <a href="agarwood.html">AI学习</a>
  <a href="tesla.html">生活百科</a>
  <a href="tools.html">工具箱</a>
  <a href="travel.html">旅行</a>
</div>

<!-- 404 Content -->
<div class="error-page" style="position: relative;">
  <!-- Decorative clouds -->
  <div class="cloud-deco cloud-1">☁️</div>
  <div class="cloud-deco cloud-2">☁️</div>
  <div class="cloud-deco cloud-3">☁️</div>

  <!-- Dragon SVG -->
  <div class="error-decoration">
    <svg class="dragon-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <!-- Simplified Chinese dragon silhouette -->
      <defs>
        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#c9a84c;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#e0c97a;stop-opacity:1" />
        </linearGradient>
      </defs>
      <!-- Dragon body (simplified S-curve) -->
      <path d="M20,70 Q30,40 50,50 Q70,60 80,35 Q85,25 75,30 Q65,35 55,45 Q40,55 30,65 Z"
            fill="url(#goldGrad)" stroke="#a68a3c" stroke-width="1"/>
      <!-- Dragon head -->
      <circle cx="80" cy="32" r="6" fill="url(#goldGrad)" stroke="#a68a3c" stroke-width="1"/>
      <!-- Horn -->
      <path d="M76,28 L72,18 L78,26" fill="url(#goldGrad)" stroke="#a68a3c" stroke-width="0.8"/>
      <path d="M82,27 L86,17 L83,25" fill="url(#goldGrad)" stroke="#a68a3c" stroke-width="0.8"/>
      <!-- Eye -->
      <circle cx="82" cy="31" r="1.2" fill="#0a0a0a"/>
      <!-- Whiskers -->
      <path d="M86,32 Q92,34 95,30" stroke="#c9a84c" stroke-width="0.8" fill="none"/>
      <path d="M86,34 Q92,38 96,36" stroke="#c9a84c" stroke-width="0.8" fill="none"/>
      <!-- Tail flame -->
      <path d="M20,70 Q15,75 10,72 Q14,78 18,76 Q22,80 25,75 Z"
            fill="#c9a84c" opacity="0.6"/>
      <!-- Scales hint -->
      <circle cx="50" cy="51" r="2" fill="none" stroke="#a68a3c" stroke-width="0.5"/>
      <circle cx="40" cy="56" r="2" fill="none" stroke="#a68a3c" stroke-width="0.5"/>
      <circle cx="60" cy="48" r="2" fill="none" stroke="#a68a3c" stroke-width="0.5"/>
    </svg>
  </div>

  <div class="error-code">404</div>
  <div class="error-message">龙兄走丢了，这页不存在 🐉</div>
  <p style="color: var(--text-muted); margin-bottom: 24px; font-size: 0.9rem;">也许龙兄正在云端游荡，不如先回首页看看？</p>
  <a href="index.html" class="btn-home">🏠 回到首页</a>
</div>

<!-- Footer -->
<footer>
  由 QClaw AI 维护 · 数据每日更新
</footer>

<!-- Theme toggle -->
<button class="theme-toggle" id="themeToggle">☀️</button>
<script src="js/app.js"></script>
</body>
</html>
