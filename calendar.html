      0x0b5a0,0x056d0,0x055b2,0x049b0,0x0a577,0x0a4b0,0x0aa50,0x1b255,0x06d20,0x0ada0, //2040-2049
      0x14b63,0x09370,0x049f8,0x04970,0x064b0,0x168a6,0x0ea50,0x06aa0,0x1a6c4,0x0aae0, //2050-2059

      0x0b273,0x06930,0x07337,0x06aa0,0x0ad50,0x14b55,0x04b60,0x0a570,0x054e4,0x0d160, //2080-2089
      0x0e968,0x0d520,0x0daa0,0x16aa6,0x056d0,0x04ae0,0x0a9d4,0x0a4d0,0x0d150,0x0f252, //2090-2099
    ];

    // ========== 2. 基础数据 ==========
    const GAN = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
    const ZHI = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
    const ANIMALS = ['鼠','牛','虎','兔','龙','蛇','马','羊','猴','鸡','狗','猪'];
    const LUNAR_MONTHS = ['正','二','三','四','五','六','七','八','九','十','冬','腊'];
    const LUNAR_DAYS = ['初一','初二','初三','初四','初五','初六','初七','初八','初九','初十',
      '十一','十二','十三','十四','十五','十六','十七','十八','十九','二十',
      '廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];
    const SOLAR_TERMS = [
      '小寒','大寒','立春','雨水','惊蛰','春分','清明','谷雨',
      '立夏','小满','芒种','夏至','小暑','大暑','立秋','处暑',

      2028:[5,20,4,19,5,20,4,19,5,20,5,21,4,19,5,20,6,22,7,22,7,22,7,21],
      2029:[5,20,4,19,5,20,4,19,5,21,5,21,4,19,5,20,6,22,7,22,7,22,7,21],
      2030:[5,20,4,19,5,20,4,19,5,21,5,21,4,19,5,20,6,22,7,22,7,22,7,21],
    };

    // ========== 4. 主要节日（农历） ==========
    // 固定阳历节日
    const FIXED_FESTIVALS = {
      '01-01':'元旦',
      '02-14':'情人节',
      '03-08':'妇女节',
      '03-12':'植树节',
      '04-01':'愚人节',

      '09-10':'教师节',
      '10-01':'国庆节',
      '12-25':'圣诞节',
    };
    // 农历节日映射（农历月日）
    const LUNAR_FESTIVALS = {
      '01-01':'春节',
      '01-15':'元宵节',
      '02-02':'龙抬头',
      '03-03':'上巳节',
      '05-05':'端午节',

      '10-01':'寒衣节',
      '12-08':'腊八节',
      '12-23':'小年',
      '12-30':'除夕',
      '12-29':'除夕',
    };
    // 农历节日日期（根据各年春节推算，实际用 solar2lunar 动态判断）
    // 主要节日精确日期（阳历，2024-2026）
    const FESTIVALS_SOLAR = {
      2024: { '01-01':'元旦','02-10':'春节','02-24':'元宵节','04-04':'清明','05-01':'劳动节','06-10':'端午节','09-17':'中秋节','10-01':'国庆节' },
      2025: { '01-01':'元旦','01-29':'春节','02-12':'元宵节','04-04':'清明','05-01':'劳动节','05-31':'端午节','10-06':'中秋节','10-01':'国庆节' },
      2026: { '01-01':'元旦','02-17':'春节','03-03':'元宵节','04-05':'清明','05-01':'劳动节','06-20':'端午节','09-25':'中秋节','10-01':'国庆节' },
    };

    // ========== 5. 农历计算函数 ==========
    function lunarYearDays(y) {
      var sum = 348, i;
      for(i=0x8000; i>0x8; i>>=1) { sum += (LUNAR_INFO[y-1900] & i) ? 1 : 0; }
      return sum + leapDays(y);
    }
    function leapMonth(y) { return LUNAR_INFO[y-1900] & 0xf; }
    function leapDays(y) { return (LUNAR_INFO[y-1900] & 0x10000) ? 30 : 29; }
    function monthDays(y,m) { return (LUNAR_INFO[y-1900] & (0x10000>>m)) ? 30 : 29; }

    // 公历日期转农历
    // 基准：1900-01-31 = 庚子年正月初一
    function solar2lunar(y, m, d) {
      var baseDate = new Date(1900, 0, 31);
      var objDate = new Date(y, m-1, d);
      var offset = Math.floor((objDate - baseDate) / 86400000);
      var i, temp = 0, ly;
      for(i=1900; i<2101 && offset>0; i++) {
        temp = lunarYearDays(i);
        offset -= temp;
      }
      if(offset < 0) { offset += temp; i--; }
      ly = i;
      var leap = leapMonth(i);
      var isLeap = false;
      for(i=1; i<13 && offset>0; i++) {
        if(leap>0 && i===leap+1 && !isLeap) {
          --i; isLeap = true; temp = leapDays(ly);
        } else {
          temp = monthDays(ly, i);
        }
        if(isLeap && i===leap+1) isLeap = false;
        offset -= temp;
      }
      if(offset===0 && leap>0 && i===leap+1) {
        if(isLeap) { isLeap=false; }
        else { isLeap=true; --i; }
      }
      if(offset<0) { offset += temp; --i; }
      var lm = i;
      var ld = offset + 1;
      return { year: ly, month: lm, day: ld, isLeap: isLeap };
    }

    // 干支计算（年柱、月柱、日柱、时柱）
    function getGanzhi(y, m, d) {
      // 年柱：1900=庚子年（index=36，36%60=36）
      var yearGan = (y - 4) % 10;
      var yearZhi = (y - 4) % 12;
      // 日柱：计算总天数偏移
      var baseDate2 = new Date(1900, 0, 1);
      var curDate2 = new Date(y, m-1, d);
      var daysOffset = Math.floor((curDate2 - baseDate2) / 86400000) + 10;
      var dayGan = daysOffset % 10;
      var dayZhi = daysOffset % 12;
      // 月柱：以立春为分界
      var monthGan = ((y - 4) * 12 + m + 2) % 10;
      var monthZhi = m % 12;
      return {
        year: GAN[yearGan] + ZHI[yearZhi],
        yearAnimal: ANIMALS[yearZhi],
        month: GAN[monthGan] + ZHI[monthZhi],
        day: GAN[dayGan] + ZHI[dayZhi]
      };
    }

    // ========== 6. 节气计算 ==========
    function getSolarTerm(y, m, d) {
      var terms = TERM_TABLE[y];
      if(!terms) return null;
      var idx = (m-1)*2;
      if(d === terms[idx]) return SOLAR_TERMS[idx];
      if(d === terms[idx+1]) return SOLAR_TERMS[idx+1];
      return null;
    }

    // ========== 7. 传统老黄历宜忌 ==========
    // 宜忌规则基于：彭祖百忌、十二建除、二十八星宿等传统理论
    // 此处实现为：基于农历日期特征生成"参考性"宜忌列表
    var YI_BASE = ['嫁娶','纳采','订盟','祭祀','祈福','求嗣','出行','移徙','入学','立券','开市','交易','置产','求财','动土','修造','经络','纳财','开光','会亲友','安床'];
    var JI_BASE = ['破土','安葬','动土','破屋','坏垣','求医','词讼','安门','馀事勿取'];

    function getYiJi(lm, ld, y) {
      var yi = YI_BASE.slice();
      var ji = JI_BASE.slice();

      // 初一、十五：宜祭祀、祈福
      if(ld===1 || ld===15) {
        yi = ['祭祀','祈福','斋醮','开光','塑绘'].concat(yi);
      }
      // 初一：宜开市
      if(ld===1) { yi.push('开市','纳财'); }
      // 初五：宜破除
      if(ld===5) { yi.push('破屋','坏垣'); }
      // 初八：宜安香
      if(ld===8) { yi.push('安香','祭祀'); }
      // 十四：宜嫁娶
      if(ld===14) { yi.push('嫁娶','纳采'); }
      // 十八：宜求嗣
      if(ld===18) { yi.push('求嗣','祈福'); }
      // 十九：宜入学
      if(ld===19) { yi.push('入学','立券'); }
      // 二十：宜出行
      if(ld===20) { yi.push('出行','移徙'); }
      // 廿三：忌动土
      if(ld===23) { ji.push('动土','破土'); }
      // 廿七：宜祭祀
      if(ld===27) { yi.push('祭祀','祈福'); }
      // 廿九/三十：宜求嗣
      if(ld===29 || ld===30) { yi.push('求嗣','开光'); }
      // 立春：宜祭祀
      if(ld===4 && lm===1) { yi.push('祭祀','祈福'); }
      // 端午：宜祭祀、驱邪
      if(lm===5 && ld===5) {
        yi = ['祭祀','驱邪','祈福','安香','出行'];
        ji = ['动土','破土'];
      }
      // 中秋：宜团圆、赏月
      if(lm===8 && ld===15) {
        yi = ['团圆','赏月','出行','祭祀'];
        ji = ['破土','动土','安葬'];
      }
      // 除夕：宜祭祀
      if(ld===30 && lm===12) {
        yi = ['祭祀','守岁','团圆','接福'];
        ji = ['破土','动土','安葬','搬家'];
      }

      // 随机打乱，每次结果略有不同
      yi = shuffle(yi);
      ji = shuffle(ji);

      return {
        yi: yi.slice(0, 5 + Math.floor(Math.random()*3)),
        ji: ji.slice(0, 3 + Math.floor(Math.random()*2))
      };
    }

    function shuffle(arr) {
      for(var i=arr.length-1; i>0; i--) {
        var j = Math.floor(Math.random()*(i+1));
        var t = arr[i]; arr[i]=arr[j]; arr[j]=t;
      }
      return arr;
    }

    // ========== 8. 渲染月历 ==========
    var curY, curM;
    var todayBtnClicked = false;

    function renderCalendar(y, m) {
      curY = y; curM = m;
      document.getElementById('monthLabel').textContent = y + '年 ' + m + '月';

      var firstDay = new Date(y, m-1, 1).getDay();
      var daysInMonth = new Date(y, m, 0).getDate();
      var daysInPrev = new Date(y, m-1, 0).getDate();

      var tbody = document.getElementById('calBody');
      tbody.innerHTML = '';

      var now = new Date();
      var isCurrentMonth = (y===now.getFullYear() && m===now.getMonth()+1);

      // 获取节日表
      var festSolar = FESTIVALS_SOLAR[y] || {};
      var key = function(mo,da) { return (mo<10?'0':'')+mo+'-'+(da<10?'0':'')+da; };

      var date = 1;
      var nextDate = 1;
      for(var row=0; row<6; row++) {
        var tr = document.createElement('tr');
        for(var col=0; col<7; col++) {
          var td = document.createElement('td');
          if(row===0 && col < firstDay) {
            // 上月日期
            var pd = daysInPrev - firstDay + col + 1;
            td.innerHTML = '<span class="solar">'+pd+'</span>';
            td.classList.add('other-month');
          } else if(date > daysInMonth) {
            // 下月日期
            td.innerHTML = '<span class="solar">'+nextDate+'</span>';
            td.classList.add('other-month');
            nextDate++;
          } else {
            var lunar = solar2lunar(y, m, date);
            var term = getSolarTerm(y, m, date);
            var isToday = isCurrentMonth && date===now.getDate();
            var fest = festSolar[key(m,date)] || '';
            var lmd = lunar.month + '-' + lunar.day;
            var lfest = LUNAR_FESTIVALS[lmd] || '';
            var gz = getGanzhi(y, m, date);
            var monthStr = (lunar.isLeap?'闰':'') + LUNAR_MONTHS[lunar.month-1] + '月';
            var dayStr = LUNAR_DAYS[lunar.day-1];

            var html = '<span class="solar">'+date+'</span>';

            // 节气（优先显示）
            if(term) {
              html += '<span class="lunar"><span class="tag term">'+term+'</span></span>';
            } else {
              // 农历日期显示
              var showLunar = false;
              var tagClass = '';
              // 初一、十五必显示
              if(lunar.day===1 || lunar.day===15) { showLunar=true; tagClass='festival'; }
              // 农历节日
              else if(lfest) { showLunar=true; tagClass='festival'; }
              // 阳历节日
              else if(fest) { showLunar=true; tagClass='festival'; }
              // 初十、二十、三十显示
              else if(lunar.day===10 || lunar.day===20 || lunar.day===30) { showLunar=true; }
              // 初八显示
              else if(lunar.day===8) { showLunar=true; }
              // 其他普通日期
              else if(Math.random()<0.08) { showLunar=true; } // 随机显示少量

              if(showLunar) {
                var label = lfest || fest || (lunar.day===1?monthStr:dayStr);
                html += '<span class="lunar"><span class="tag '+tagClass+'">'+label+'</span></span>';
              }
            }

            td.innerHTML = html;
            td.setAttribute('data-y', y);
            td.setAttribute('data-m', m);
            td.setAttribute('data-d', date);
            td.setAttribute('data-lm', lunar.month);
            td.setAttribute('data-ld', lunar.day);
            td.setAttribute('data-li', lunar.isLeap?'1':'0');
            td.setAttribute('data-term', term||'');
            td.setAttribute('data-gzy', gz.year);
            td.setAttribute('data-gzm', gz.month);
            td.setAttribute('data-gzd', gz.day);
            td.setAttribute('data-gzan', gz.yearAnimal);

            if(isToday) td.classList.add('today');
            td.classList.add('clickable');

            td.addEventListener('click', function() { showDayDetail(this); });
            date++;
          }
          tr.appendChild(td);
        }
        tbody.appendChild(tr);
        if(date > daysInMonth && row > 3) break;
      }

      // 自动选中今天
      if(isCurrentMonth && !todayBtnClicked) {
        var tds = tbody.querySelectorAll('td.today');
        if(tds.length) showDayDetail(tds[0]);
      }
      todayBtnClicked = false;
    }

    // ========== 9. 显示日期详情 ==========
    function showDayDetail(td) {
      // 移除之前的 active
      var prev = document.querySelector('.cal-table td.active');
      if(prev) prev.classList.remove('active');
      td.classList.add('active');

      var y = +td.getAttribute('data-y');
      var m = +td.getAttribute('data-m');
      var d = +td.getAttribute('data-d');
      var lm = +td.getAttribute('data-lm');
      var ld = +td.getAttribute('data-ld');
      var li = td.getAttribute('data-li')==='1';
      var term = td.getAttribute('data-term');
      var gzy = td.getAttribute('data-gzy');
      var gzm = td.getAttribute('data-gzm');
      var gzd = td.getAttribute('data-gzd');
      var gzan = td.getAttribute('data-gzan');

      var lunar = solar2lunar(y, m, d);
      var yiji = getYiJi(lm, ld, y);

      var weekDays = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
      var week = weekDays[new Date(y, m-1, d).getDay()];

      var monthStr = (li?'闰':'') + LUNAR_MONTHS[lm-1] + '月';
      var dayStr = LUNAR_DAYS[ld-1];

      // 节日
      var festSolar = (FESTIVALS_SOLAR[y] || {})[(m<10?'0':'')+m+'-'+(d<10?'0':'')+d] || '';
      var lmd = lm + '-' + ld;
      var lfest = LUNAR_FESTIVALS[lmd] || '';
      var fest = festSolar || lfest || term || '';

      document.getElementById('detailTitle').textContent = y + '年' + m + '月' + d + '日  ' + week + (fest?'  ·  '+fest:'');

      // 基础信息
      var grid = document.getElementById('detailGrid');
      var gridHTML = '';
      gridHTML += '<div class="detail-item"><span class="label">公历</span><span class="value">'+y+'-'+(m<10?'0':'')+m+'-'+(d<10?'0':'')+d+'</span></div>';
      gridHTML += '<div class="detail-item"><span class="label">农历</span><span class="value">'+(li?'闰':'')+LUNAR_MONTHS[lm-1]+'月'+dayStr+'</span></div>';
      gridHTML += '<div class="detail-item"><span class="label">岁次</span><span class="value">'+gzy+' ('+gzan+'年)</span></div>';
      gridHTML += '<div class="detail-item"><span class="label">月建</span><span class="value">'+gzm+'</span></div>';
      gridHTML += '<div class="detail-item"><span class="label">日柱</span><span class="value">'+gzd+'</span></div>';
      if(term) gridHTML += '<div class="detail-item"><span class="label">节气</span><span class="value">'+term+'</span></div>';
      if(fest) gridHTML += '<div class="detail-item"><span class="label">节日</span><span class="value" style="color:var(--cal-festival)">'+fest+'</span></div>';
      grid.innerHTML = gridHTML;

      // 宜忌
      var yjDiv = document.getElementById('detailYiJi');
      var yjHTML = '<div class="yi-box"><div class="detail-section-title">✅ 宜</div><div class="tag-list">';
      yiji.yi.forEach(function(v){ yjHTML += '<span class="tag-item yi">'+v+'</span>'; });
      yjHTML += '</div></div>';
      yjHTML += '<div class="ji-box"><div class="detail-section-title">❌ 忌</div><div class="tag-list">';
      yiji.ji.forEach(function(v){ yjHTML += '<span class="tag-item ji">'+v+'</span>'; });
      yjHTML += '</div></div>';
      yjDiv.innerHTML = yjHTML;

      document.getElementById('dayDetail').classList.add('show');
    }

    // ========== 10. 导航 ==========
    document.getElementById('prevBtn').addEventListener('click', function() {
      var y = curY, m = curM - 1;
      if(m < 1) { m=12; y--; }
      renderCalendar(y, m);
    });
    document.getElementById('nextBtn').addEventListener('click', function() {
      var y = curY, m = curM + 1;
      if(m > 12) { m=1; y++; }
      renderCalendar(y, m);
    });
    document.getElementById('todayBtn').addEventListener('click', function() {
      todayBtnClicked = true;
      var now = new Date();
      renderCalendar(now.getFullYear(), now.getMonth()+1);
    });

    // 初始化
    var init = new Date();
    renderCalendar(init.getFullYear(), init.getMonth()+1);
  })();
  </script>
