<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Nintendo 3DS - 正面视图 -->
  <!-- 机身主体 -->
  <rect x="80" y="25" width="240" height="250" rx="14" fill="#1a1a2e" stroke="#0f0f1a" stroke-width="2"/>
  
  <!-- 上屏幕 -->
  <rect x="100" y="40" width="200" height="95" rx="8" fill="#111"/>
  <rect x="105" y="45" width="190" height="85" rx="6" fill="#4a90d9"/>
  
  <!-- 上屏幕内容 -->
  <text x="200" y="92" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">3DS</text>
  
  <!-- 3D指示灯 -->
  <circle cx="110" cy="145" r="4" fill="#00cc00" opacity="0.9"/>
  <text x="125" y="148" fill="#888" font-size="6">3D</text>
  
  <!-- 折叠区域 -->
  <rect x="85" y="140" width="230" height="12" rx="4" fill="#2a2a3e"/>
  
  <!-- 下屏幕（触摸屏） -->
  <rect x="100" y="160" width="200" height="100" rx="8" fill="#111"/>
  <rect x="105" y="165" width="190" height="90" rx="6" fill="#222"/>
  
  <!-- 下屏幕触摸提示 -->
  <text x="200" y="215" text-anchor="middle" fill="#4a90d9" font-size="10">TOUCH SCREEN</text>
  
  <!-- 控制区域 -->
  <!-- 圆形方向键（摇杆） -->
  <circle cx="125" cy="215" r="14" fill="#333"/>
  <circle cx="125" cy="215" r="10" fill="#222"/>
  
  <!-- 十字键 -->
  <rect x="255" y="200" width="28" height="10" rx="2" fill="#333"/>
  <rect x="264" y="191" width="10" height="28" rx="2" fill="#333"/>
  
  <!-- A/B/X/Y按钮 -->
  <circle cx="310" cy="200" r="7" fill="#e60012"/>
  <circle cx="320" cy="210" r="7" fill="#ffd700"/>
  <circle cx="310" cy="220" r="7" fill="#00a651"/>
  <circle cx="300" cy="210" r="7" fill="#0066cc"/>
  
  <!-- 扬声器孔 -->
  <g>
    <line x1="315" y1="45" x2="315" y2="55" stroke="#666" stroke-width="1"/>
    <line x1="320" y1="45" x2="320" y2="55" stroke="#666" stroke-width="1"/>
    <line x1="325" y1="45" x2="325" y2="55" stroke="#666" stroke-width="1"/>
  </g>
  
  <!-- 阴影效果 -->
  <ellipse cx="200" cy="285" rx="120" ry="8" fill="rgba(0,0,0,0.15)"/>
</svg>