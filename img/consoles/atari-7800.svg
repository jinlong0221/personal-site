<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Atari 7800 - 正面视图 -->
  <!-- 机身主体 - 黑色 -->
  <rect x="60" y="75" width="280" height="170" rx="10" fill="#1a1a1a" stroke="#0f0f0f" stroke-width="2"/>
  
  <!-- 顶部区域 -->
  <rect x="60" y="75" width="280" height="35" rx="10" fill="#333"/>
  
  <!-- 卡带槽 -->
  <rect x="80" y="120" width="150" height="100" rx="6" fill="#2a2a2a"/>
  <rect x="90" y="130" width="130" height="80" rx="4" fill="#1a1a1a"/>
  <rect x="100" y="140" width="110" height="60" rx="3" fill="#222"/>
  
  <!-- 手柄接口 -->
  <rect x="250" y="130" width="70" height="70" rx="4" fill="#333"/>
  <rect x="262" y="142" width="18" height="45" rx="2" fill="#1a1a1a"/>
  <rect x="290" y="142" width="18" height="45" rx="2" fill="#1a1a1a"/>
  
  <!-- 开关 -->
  <rect x="260" y="92" width="50" height="12" rx="2" fill="#444"/>
  <text x="285" y="102" text-anchor="middle" fill="#888" font-size="5">POWER</text>
  
  <!-- ATARI LOGO -->
  <text x="150" y="95" text-anchor="middle" fill="#888" font-size="12" font-weight="bold">ATARI</text>
  
  <!-- 7800 标识 -->
  <text x="200" y="255" text-anchor="middle" fill="#666" font-size="10" font-weight="bold">7800</text>
  
  <!-- 阴影效果 -->
  <ellipse cx="200" cy="265" rx="140" ry="10" fill="rgba(0,0,0,0.15)"/>
</svg>