<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Atari Lynx - 正面视图 -->
  <!-- 机身主体 - 黑色掌机 -->
  <rect x="60" y="70" width="280" height="170" rx="15" fill="#1a1a1a" stroke="#0f0f0f" stroke-width="2"/>
  
  <!-- 屏幕 -->
  <rect x="100" y="90" width="200" height="110" rx="6" fill="#222"/>
  <rect x="105" y="95" width="190" height="100" rx="4" fill="#4a90d9"/>
  
  <!-- 屏幕内容 -->
  <text x="200" y="145" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">LYNX</text>
  
  <!-- 左侧控制 -->
  <rect x="75" y="110" width="20" height="8" rx="2" fill="#333"/>
  <rect x="81" y="104" width="8" height="20" rx="2" fill="#333"/>
  
  <!-- 右侧控制 -->
  <circle cx="295" cy="130" r="8" fill="#333"/>
  <circle cx="295" cy="150" r="8" fill="#333"/>
  <text x="295" y="134" text-anchor="middle" fill="#888" font-size="6">A</text>
  <text x="295" y="154" text-anchor="middle" fill="#888" font-size="6">B</text>
  
  <!-- START/SELECT -->
  <rect x="160" y="205" width="25" height="6" rx="3" fill="#333"/>
  <rect x="215" y="205" width="25" height="6" rx="3" fill="#333"/>
  <text x="173" y="210" text-anchor="middle" fill="#666" font-size="4">START</text>
  <text x="228" y="210" text-anchor="middle" fill="#666" font-size="4">SELECT</text>
  
  <!-- ATARI LOGO -->
  <text x="200" y="85" text-anchor="middle" fill="#888" font-size="10" font-weight="bold">ATARI</text>
  
  <!-- 阴影效果 -->
  <ellipse cx="200" cy="255" rx="140" ry="10" fill="rgba(0,0,0,0.12)"/>
</svg>