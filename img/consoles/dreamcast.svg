<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Sega Dreamcast - 正面视图 -->
  <!-- 机身主体 - 白色 -->
  <path d="M80 70 L320 70 Q350 70 350 100 L350 200 Q350 230 320 230 L80 230 Q50 230 50 200 L50 100 Q50 70 80 70 Z" fill="#f5f5f5" stroke="#ddd" stroke-width="2"/>
  
  <!-- 光驱盖 -->
  <circle cx="200" cy="140" r="50" fill="#e0e0e0" stroke="#ccc" stroke-width="1"/>
  <circle cx="200" cy="140" r="42" fill="#f0f0f0"/>
  <circle cx="200" cy="140" r="35" fill="#e8e8e8"/>
  
  <!-- CD标识 -->
  <circle cx="200" cy="140" r="20" fill="none" stroke="#bbb" stroke-width="2"/>
  <circle cx="200" cy="140" r="8" fill="#ddd"/>
  
  <!-- 手柄接口 -->
  <rect x="100" y="190" width="200" height="25" rx="4" fill="#e8e8e8"/>
  <rect x="120" y="195" width="18" height="15" rx="2" fill="#ccc"/>
  <rect x="170" y="195" width="18" height="15" rx="2" fill="#ccc"/>
  <rect x="220" y="195" width="18" height="15" rx="2" fill="#ccc"/>
  <rect x="270" y="195" width="18" height="15" rx="2" fill="#ccc"/>
  
  <!-- 电源指示灯 -->
  <circle cx="65" cy="85" r="5" fill="#00a651" opacity="0.8"/>
  
  <!-- DREAMCAST LOGO -->
  <text x="200" y="95" text-anchor="middle" fill="#ff6600" font-size="14" font-weight="bold">DREAMCAST</text>
  
  <!-- SEGA LOGO -->
  <text x="200" y="230" text-anchor="middle" fill="#1e5fa8" font-size="10" font-weight="bold">SEGA</text>
  
  <!-- 阴影效果 -->
  <ellipse cx="200" cy="250" rx="150" ry="10" fill="rgba(0,0,0,0.1)"/>
</svg>