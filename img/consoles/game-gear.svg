<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Sega Game Gear - 正面视图 -->
  <!-- 机身主体 - 黑色横向掌机 -->
  <rect x="50" y="80" width="300" height="150" rx="12" fill="#1a1a1a" stroke="#0f0f0f" stroke-width="2"/>
  
  <!-- 屏幕 -->
  <rect x="100" y="100" width="160" height="100" rx="6" fill="#222"/>
  <rect x="105" y="105" width="150" height="90" rx="4" fill="#4a90d9"/>
  
  <!-- 屏幕内容 -->
  <text x="180" y="155" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">GAME GEAR</text>
  
  <!-- 左侧控制 -->
  <!-- 方向键 -->
  <rect x="60" y="120" width="35" height="12" rx="3" fill="#333"/>
  <rect x="72" y="108" width="11" height="36" rx="3" fill="#333"/>
  
  <!-- START -->
  <rect x="60" y="170" width="30" height="8" rx="4" fill="#333"/>
  <text x="75" y="178" text-anchor="middle" fill="#666" font-size="5">START</text>
  
  <!-- 右侧控制 -->
  <!-- 按钮 -->
  <circle cx="295" cy="130" r="10" fill="#333"/>
  <circle cx="295" cy="155" r="10" fill="#333"/>
  <text x="295" y="134" text-anchor="middle" fill="#888" font-size="6">1</text>
  <text x="295" y="159" text-anchor="middle" fill="#888" font-size="6">2</text>
  
  <!-- SEGA LOGO -->
  <text x="180" y="95" text-anchor="middle" fill="#1e5fa8" font-size="10" font-weight="bold">SEGA</text>
  
  <!-- 指示灯 -->
  <circle cx="110" y="210" r="3" fill="#00cc00" opacity="0.8"/>
  <text x="120" y="213" fill="#666" font-size="5">POWER</text>
  
  <!-- 阴影效果 -->
  <ellipse cx="200" cy="240" rx="150" ry="8" fill="rgba(0,0,0,0.12)"/>
</svg>