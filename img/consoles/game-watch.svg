<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Nintendo Game & Watch - 正面视图 -->
  <!-- 机身主体 - 经典掌机 -->
  <rect x="100" y="70" width="200" height="160" rx="15" fill="#6b6b6b"/>
  
  <!-- 屏幕 -->
  <rect x="140" y="90" width="120" height="70" rx="6" fill="#222"/>
  <rect x="145" y="95" width="110" height="60" rx="4" fill="#9bbc0f"/>
  
  <!-- 屏幕内容 -->
  <text x="200" y="130" text-anchor="middle" fill="#0f380f" font-size="10">GAME</text>
  <text x="200" y="145" text-anchor="middle" fill="#0f380f" font-size="8">& WATCH</text>
  
  <!-- 左侧控制 -->
  <rect x="115" y="125" width="20" height="8" rx="2" fill="#444"/>
  <rect x="121" y="119" width="8" height="20" rx="2" fill="#444"/>
  
  <!-- 右侧控制 -->
  <circle cx="275" cy="130" r="8" fill="#444"/>
  <text x="275" y="133" text-anchor="middle" fill="#666" font-size="6">A</text>
  <circle cx="295" cy="140" r="8" fill="#444"/>
  <text x="295" y="143" text-anchor="middle" fill="#666" font-size="6">B</text>
  
  <!-- 底部文字 -->
  <text x="200" y="185" text-anchor="middle" fill="#ccc" font-size="8">GAME & WATCH</text>
  
  <!-- 底部装饰 -->
  <rect x="160" y="200" width="80" height="20" rx="4" fill="#555"/>
  <text x="200" y="213" text-anchor="middle" fill="#aaa" font-size="6">NINTENDO</text>
  
  <!-- 阴影效果 -->
  <ellipse cx="200" cy="250" rx="100" ry="10" fill="rgba(0,0,0,0.12)"/>
</svg>