<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Nintendo Game Boy Advance - 正面视图 -->
  <!-- 机身主体 - 横向设计，紫色 -->
  <path d="M60 100 L340 100 Q350 100 350 110 L350 200 Q350 210 340 210 L60 210 Q50 210 50 200 L50 110 Q50 100 60 100 Z" fill="#7b5fa9" stroke="#5a4a8a" stroke-width="2"/>
  
  <!-- 屏幕区域 -->
  <rect x="120" y="115" width="160" height="85" rx="4" fill="#222"/>
  <rect x="125" y="120" width="150" height="75" rx="3" fill="#9bbc0f"/>
  
  <!-- 屏幕内容 -->
  <text x="200" y="165" text-anchor="middle" fill="#0f380f" font-size="14" font-weight="bold">GAME BOY</text>
  <text x="200" y="180" text-anchor="middle" fill="#0f380f" font-size="10" font-weight="bold">ADVANCE</text>
  
  <!-- 左侧控制 -->
  <!-- 十字键 -->
  <rect x="70" y="135" width="35" height="12" rx="3" fill="#3a2a5a"/>
  <rect x="82" y="123" width="11" height="36" rx="3" fill="#3a2a5a"/>
  
  <!-- L按钮 -->
  <rect x="65" y="100" width="40" height="12" rx="4" fill="#5a4a8a"/>
  <text x="85" y="109" text-anchor="middle" fill="#fff" font-size="8" font-weight="bold">L</text>
  
  <!-- 右侧控制 -->
  <!-- A/B按钮 -->
  <circle cx="295" cy="140" r="15" fill="#cc0066"/>
  <circle cx="295" cy="140" r="11" fill="#aa0055"/>
  <text x="295" y="144" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">A</text>
  
  <circle cx="325" cy="160" r="15" fill="#cc0066"/>
  <circle cx="325" cy="160" r="11" fill="#aa0055"/>
  <text x="325" y="164" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">B</text>
  
  <!-- R按钮 -->
  <rect x="295" y="100" width="40" height="12" rx="4" fill="#5a4a8a"/>
  <text x="315" y="109" text-anchor="middle" fill="#fff" font-size="8" font-weight="bold">R</text>
  
  <!-- START/SELECT按钮 -->
  <ellipse cx="200" cy="200" rx="15" ry="5" fill="#5a4a8a"/>
  <ellipse cx="200" cy="200" rx="11" ry="3" fill="#4a3a7a"/>
  <text x="200" y="200" text-anchor="middle" fill="#fff" font-size="5">START</text>
  
  <ellipse cx="240" cy="200" rx="15" ry="5" fill="#5a4a8a"/>
  <ellipse cx="240" cy="200" rx="11" ry="3" fill="#4a3a7a"/>
  <text x="240" y="200" text-anchor="middle" fill="#fff" font-size="5">SELECT</text>
  
  <!-- Nintendo LOGO -->
  <text x="200" y="110" text-anchor="middle" fill="#fff" font-size="7" font-weight="bold">NINTENDO</text>
  
  <!-- 阴影效果 -->
  <ellipse cx="200" cy="225" rx="150" ry="8" fill="rgba(0,0,0,0.1)"/>
</svg>