<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Nintendo Game Boy Color - 正面视图 -->
  <!-- 机身主体 - 紫色 -->
  <rect x="100" y="30" width="200" height="250" rx="12" fill="#7b5fa9" stroke="#5a4a8a" stroke-width="2"/>
  
  <!-- 屏幕区域 -->
  <rect x="130" y="50" width="140" height="105" rx="8" fill="#4a3a6a" stroke="#3a2a5a" stroke-width="2"/>
  <rect x="140" y="60" width="120" height="85" rx="4" fill="#9bbc0f"/>
  
  <!-- 屏幕内容 -->
  <text x="200" y="100" text-anchor="middle" fill="#0f380f" font-size="12" font-weight="bold">GAME BOY</text>
  <text x="200" y="115" text-anchor="middle" fill="#0f380f" font-size="10" font-weight="bold">COLOR</text>
  
  <!-- 屏幕指示灯 -->
  <circle cx="145" cy="160" r="3" fill="#00cc00"/>
  
  <!-- 控制区域 -->
  <!-- 十字键 -->
  <rect x="125" y="180" width="30" height="10" rx="2" fill="#3a2a5a"/>
  <rect x="135" y="170" width="10" height="30" rx="2" fill="#3a2a5a"/>
  
  <!-- A/B按钮 -->
  <circle cx="280" cy="205" r="14" fill="#cc0066"/>
  <circle cx="280" cy="205" r="10" fill="#aa0055"/>
  <text x="280" y="209" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">A</text>
  
  <circle cx="250" cy="185" r="14" fill="#cc0066"/>
  <circle cx="250" cy="185" r="10" fill="#aa0055"/>
  <text x="250" y="189" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">B</text>
  
  <!-- START/SELECT按钮 -->
  <ellipse cx="200" cy="240" rx="18" ry="6" fill="#5a4a8a"/>
  <ellipse cx="200" cy="240" rx="14" ry="4" fill="#4a3a7a"/>
  <text x="200" y="255" text-anchor="middle" fill="#ddd" font-size="6">START</text>
  
  <ellipse cx="200" cy="265" rx="18" ry="6" fill="#5a4a8a"/>
  <ellipse cx="200" cy="265" rx="14" ry="4" fill="#4a3a7a"/>
  <text x="200" y="278" text-anchor="middle" fill="#ddd" font-size="6">SELECT</text>
  
  <!-- 扬声器格栅 -->
  <g>
    <line x1="270" y1="240" x2="290" y2="240" stroke="#9a8aba" stroke-width="2"/>
    <line x1="270" y1="248" x2="290" y2="248" stroke="#9a8aba" stroke-width="2"/>
    <line x1="270" y1="256" x2="290" y2="256" stroke="#9a8aba" stroke-width="2"/>
    <line x1="270" y1="264" x2="290" y2="264" stroke="#9a8aba" stroke-width="2"/>
  </g>
  
  <!-- Nintendo LOGO -->
  <text x="200" y="45" text-anchor="middle" fill="#fff" font-size="7" font-weight="bold">NINTENDO</text>
  
  <!-- 阴影效果 -->
  <ellipse cx="200" cy="290" rx="100" ry="6" fill="rgba(0,0,0,0.1)"/>
</svg>