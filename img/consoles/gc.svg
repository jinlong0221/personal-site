<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Nintendo GameCube - 正面视图 -->
  <!-- 机身主体 - 立方形设计，紫色 -->
  <rect x="80" y="70" width="240" height="170" rx="12" fill="#503894" stroke="#3d2a73" stroke-width="2"/>
  
  <!-- 顶部光面 -->
  <rect x="80" y="70" width="240" height="20" rx="12" fill="#6b4d9e"/>
  
  <!-- 光驱盖板 -->
  <circle cx="200" cy="130" r="50" fill="#3d2a73"/>
  <circle cx="200" cy="130" r="42" fill="#2d1f57"/>
  <circle cx="200" cy="130" r="35" fill="#4a3882"/>
  
  <!-- 光驱指示灯 -->
  <circle cx="200" cy="95" r="4" fill="#00ff00" opacity="0.8"/>
  
  <!-- 电源按钮 -->
  <circle cx="280" cy="130" r="15" fill="#3d2a73" stroke="#2d1f57" stroke-width="1.5"/>
  <circle cx="280" cy="130" r="10" fill="#503894"/>
  <text x="280" y="133" text-anchor="middle" fill="#ddd" font-size="6" font-weight="bold">POWER</text>
  
  <!-- 手柄接口 -->
  <rect x="100" y="190" width="200" height="35" rx="6" fill="#3d2a73"/>
  
  <!-- 四个手柄端口 -->
  <circle cx="130" cy="207" r="12" fill="#2d1f57"/>
  <circle cx="130" cy="207" r="8" fill="#222"/>
  <text x="130" y="225" text-anchor="middle" fill="#888" font-size="5">1</text>
  
  <circle cx="180" cy="207" r="12" fill="#2d1f57"/>
  <circle cx="180" cy="207" r="8" fill="#222"/>
  <text x="180" y="225" text-anchor="middle" fill="#888" font-size="5">2</text>
  
  <circle cx="220" cy="207" r="12" fill="#2d1f57"/>
  <circle cx="220" cy="207" r="8" fill="#222"/>
  <text x="220" y="225" text-anchor="middle" fill="#888" font-size="5">3</text>
  
  <circle cx="270" cy="207" r="12" fill="#2d1f57"/>
  <circle cx="270" cy="207" r="8" fill="#222"/>
  <text x="270" y="225" text-anchor="middle" fill="#888" font-size="5">4</text>
  
  <!-- GAMECUBE LOGO -->
  <g transform="translate(200, 170)">
    <!-- 简化的GameCube标志 -->
    <circle cx="0" cy="0" r="20" fill="none" stroke="#fff" stroke-width="3"/>
    <text x="0" y="5" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">GC</text>
  </g>
  
  <!-- 阴影效果 -->
  <ellipse cx="200" cy="250" rx="120" ry="10" fill="rgba(0,0,0,0.15)"/>
</svg>