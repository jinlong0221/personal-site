<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Lenovo Legion Go - 正面视图 -->
  <!-- 机身主体 - 黑色掌机 -->
  <rect x="45" y="45" width="310" height="210" rx="18" fill="#1a1a1a" stroke="#0f0f0f" stroke-width="2"/>
  
  <!-- 屏幕 -->
  <rect x="70" y="65" width="260" height="145" rx="10" fill="#111"/>
  <rect x="75" y="70" width="250" height="135" rx="8" fill="#4a90d9"/>
  
  <!-- 屏幕内容 -->
  <text x="200" y="140" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">LEGION GO</text>
  <text x="200" y="160" text-anchor="middle" fill="#fff" font-size="10">Portable Gaming</text>
  
  <!-- 左侧控制 -->
  <!-- 左摇杆 -->
  <circle cx="70" cy="90" r="18" fill="#333"/>
  <circle cx="70" cy="90" r="12" fill="#222"/>
  
  <!-- 十字键 -->
  <rect x="48" y="180" width="44" height="15" rx="4" fill="#333"/>
  <rect x="63" y="165" width="14" height="45" rx="4" fill="#333"/>
  
  <!-- 右侧控制 -->
  <!-- 右摇杆 -->
  <circle cx="330" cy="90" r="18" fill="#333"/>
  <circle cx="330" cy="90" r="12" fill="#222"/>
  
  <!-- A/B/X/Y按钮 -->
  <circle cx="330" cy="185" r="10" fill="#e60012"/>
  <circle cx="355" cy="210" r="10" fill="#00a651"/>
  <circle cx="330" cy="235" r="10" fill="#0066cc"/>
  <circle cx="305" cy="210" r="10" fill="#ffd700"/>
  
  <!-- LEGION LOGO -->
  <text x="200" y="60" text-anchor="middle" fill="#e60012" font-size="11" font-weight="bold">LEGION</text>
  
  <!-- 阴影效果 -->
  <ellipse cx="200" cy="270" rx="155" ry="10" fill="rgba(0,0,0,0.15)"/>
</svg>