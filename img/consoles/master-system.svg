<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Sega Master System - 正面视图 -->
  <!-- 机身主体 - 黑色 -->
  <rect x="60" y="70" width="280" height="170" rx="10" fill="#1a1a1a" stroke="#0f0f0f" stroke-width="2"/>
  
  <!-- 顶部装饰区域 -->
  <rect x="60" y="70" width="280" height="30" rx="10" fill="#333"/>
  
  <!-- 卡带槽 -->
  <rect x="80" y="110" width="150" height="100" rx="6" fill="#2a2a2a"/>
  <rect x="90" y="120" width="130" height="80" rx="4" fill="#1a1a1a"/>
  <rect x="100" y="130" width="110" height="60" rx="3" fill="#222"/>
  
  <!-- 手柄接口 -->
  <rect x="250" y="130" width="70" height="60" rx="4" fill="#333"/>
  <rect x="260" y="140" width="20" height="40" rx="2" fill="#1a1a1a"/>
  <rect x="290" y="140" width="20" height="40" rx="2" fill="#1a1a1a"/>
  
  <!-- 指示灯 -->
  <circle cx="75" y="85" r="4" fill="#ff0000" opacity="0.8"/>
  <text x="85" y="88" fill="#888" font-size="5">POWER</text>
  
  <!-- SEGA LOGO -->
  <text x="200" y="90" text-anchor="middle" fill="#1e5fa8" font-size="12" font-weight="bold">SEGA</text>
  
  <!-- MASTER SYSTEM 标识 -->
  <text x="200" y="230" text-anchor="middle" fill="#666" font-size="10" font-weight="bold">MASTER SYSTEM</text>
  
  <!-- 阴影效果 -->
  <ellipse cx="200" cy="255" rx="140" ry="10" fill="rgba(0,0,0,0.15)"/>
</svg>