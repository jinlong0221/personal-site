<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Sega Mega Drive - 正面视图 -->
  <!-- 机身主体 - 黑色 -->
  <rect x="50" y="70" width="300" height="170" rx="10" fill="#1a1a1a" stroke="#0f0f0f" stroke-width="2"/>
  
  <!-- 顶部装饰区域 -->
  <rect x="50" y="70" width="300" height="35" rx="10" fill="#333"/>
  
  <!-- 卡带槽 -->
  <rect x="70" y="120" width="180" height="90" rx="6" fill="#2a2a2a"/>
  <rect x="80" y="130" width="160" height="70" rx="4" fill="#1a1a1a"/>
  <rect x="90" y="140" width="140" height="50" rx="3" fill="#222"/>
  
  <!-- 16-BIT 标识 -->
  <text x="160" y="165" text-anchor="middle" fill="#1e5fa8" font-size="10" font-weight="bold">16-BIT</text>
  
  <!-- 手柄接口 -->
  <rect x="270" y="130" width="60" height="70" rx="4" fill="#333"/>
  <rect x="280" y="145" width="18" height="40" rx="2" fill="#1a1a1a"/>
  <rect x="302" y="145" width="18" height="40" rx="2" fill="#1a1a1a"/>
  
  <!-- 音量旋钮 -->
  <circle cx="75" y="220" r="12" fill="#333"/>
  <circle cx="75" y="220" r="8" fill="#222"/>
  <line x1="75" y1="212" x2="75" y2="220" stroke="#888" stroke-width="2"/>
  <text x="75" y="240" text-anchor="middle" fill="#666" font-size="5">VOL</text>
  
  <!-- SEGA LOGO -->
  <text x="200" y="92" text-anchor="middle" fill="#1e5fa8" font-size="14" font-weight="bold">SEGA</text>
  
  <!-- MEGA DRIVE 标识 -->
  <text x="200" y="230" text-anchor="middle" fill="#666" font-size="11" font-weight="bold">MEGA DRIVE</text>
  
  <!-- 阴影效果 -->
  <ellipse cx="200" cy="255" rx="150" ry="10" fill="rgba(0,0,0,0.15)"/>
</svg>