<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Nintendo 64 - 正面视图 -->
  <!-- 机身主体 - 黑色圆润设计 -->
  <path d="M100 90 Q100 70 120 70 L280 70 Q300 70 300 90 L310 200 Q310 220 290 220 L110 220 Q90 220 90 200 Z" fill="#2d2d2d" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- 顶部区域 -->
  <ellipse cx="200" cy="75" rx="100" ry="12" fill="#1f1f1f"/>
  
  <!-- 卡带槽 -->
  <rect x="150" y="85" width="100" height="60" rx="4" fill="#3a3a3a"/>
  <rect x="160" y="90" width="80" height="50" rx="3" fill="#2a2a2a"/>
  <rect x="170" y="95" width="60" height="40" rx="2" fill="#222"/>
  
  <!-- 卡带槽内部纹理 -->
  <line x1="180" y1="105" x2="220" y2="105" stroke="#333" stroke-width="2"/>
  <line x1="180" y1="115" x2="220" y2="115" stroke="#333" stroke-width="2"/>
  <line x1="180" y1="125" x2="220" y2="125" stroke="#333" stroke-width="2"/>
  
  <!-- 电源按钮 -->
  <circle cx="280" cy="100" r="12" fill="#444" stroke="#333" stroke-width="1.5"/>
  <circle cx="280" cy="100" r="8" fill="#c41e3a"/>
  
  <!-- 重置按钮 -->
  <circle cx="280" cy="130" r="8" fill="#444" stroke="#333" stroke-width="1"/>
  <circle cx="280" cy="130" r="5" fill="#222"/>
  
  <!-- 手柄接口 -->
  <rect x="90" y="180" width="220" height="30" rx="4" fill="#1f1f1f"/>
  
  <!-- 四个手柄端口 -->
  <circle cx="120" cy="195" r="12" fill="#333" stroke="#222" stroke-width="1"/>
  <circle cx="120" cy="195" r="8" fill="#2a2a2a"/>
  <text x="120" y="215" text-anchor="middle" fill="#666" font-size="5">1</text>
  
  <circle cx="170" cy="195" r="12" fill="#333" stroke="#222" stroke-width="1"/>
  <circle cx="170" cy="195" r="8" fill="#2a2a2a"/>
  <text x="170" y="215" text-anchor="middle" fill="#666" font-size="5">2</text>
  
  <circle cx="220" cy="195" r="12" fill="#333" stroke="#222" stroke-width="1"/>
  <circle cx="220" cy="195" r="8" fill="#2a2a2a"/>
  <text x="220" y="215" text-anchor="middle" fill="#666" font-size="5">3</text>
  
  <circle cx="270" cy="195" r="12" fill="#333" stroke="#222" stroke-width="1"/>
  <circle cx="270" cy="195" r="8" fill="#2a2a2a"/>
  <text x="270" y="215" text-anchor="middle" fill="#666" font-size="5">4</text>
  
  <!-- NINTENDO 64 LOGO -->
  <text x="200" y="165" text-anchor="middle" fill="#e60012" font-size="16" font-weight="bold" font-family="Arial, sans-serif">NINTENDO 64</text>
  
  <!-- 底部装饰 -->
  <rect x="90" y="225" width="220" height="3" fill="#1a1a1a"/>
  
  <!-- 阴影效果 -->
  <ellipse cx="200" cy="245" rx="110" ry="8" fill="rgba(0,0,0,0.2)"/>
</svg>