<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Nintendo DS - 正面视图 -->
  <!-- 机身主体 -->
  <rect x="90" y="30" width="220" height="240" rx="12" fill="#c8c8c8" stroke="#a8a8a8" stroke-width="2"/>
  
  <!-- 上屏幕 -->
  <rect x="110" y="45" width="180" height="100" rx="6" fill="#222"/>
  <rect x="115" y="50" width="170" height="90" rx="4" fill="#4a90d9"/>
  
  <!-- 上屏幕内容 -->
  <text x="200" y="100" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">NINTENDO DS</text>
  
  <!-- 折叠区域 -->
  <rect x="100" y="150" width="200" height="15" rx="4" fill="#888"/>
  
  <!-- 下屏幕（触摸屏） -->
  <rect x="110" y="170" width="180" height="100" rx="6" fill="#222"/>
  <rect x="115" y="175" width="170" height="90" rx="4" fill="#4a90d9"/>
  
  <!-- 下屏幕触摸提示 -->
  <text x="200" y="225" text-anchor="middle" fill="#fff" font-size="10">TOUCH SCREEN</text>
  
  <!-- 控制区域 -->
  <!-- 十字键 -->
  <rect x="125" y="180" width="25" height="10" rx="2" fill="#666"/>
  <rect x="132" y="173" width="10" height="24" rx="2" fill="#666"/>
  
  <!-- A/B/X/Y按钮 -->
  <circle cx="295" cy="210" r="7" fill="#e60012"/>
  <circle cx="282" cy="197" r="7" fill="#00a651"/>
  <circle cx="295" cy="184" r="7" fill="#ffd700"/>
  <circle cx="308" cy="197" r="7" fill="#0066cc"/>
  
  <!-- 电源指示灯 -->
  <circle cx="310" cy="55" r="4" fill="#00cc00" opacity="0.8"/>
  
  <!-- 扬声器孔 -->
  <g>
    <line x1="110" y1="55" x2="110" y2="65" stroke="#999" stroke-width="1.5"/>
    <line x1="115" y1="55" x2="115" y2="65" stroke="#999" stroke-width="1.5"/>
  </g>
  
  <!-- 阴影效果 -->
  <ellipse cx="200" cy="280" rx="110" ry="8" fill="rgba(0,0,0,0.1)"/>
</svg>