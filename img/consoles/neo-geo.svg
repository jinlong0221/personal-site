<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- SNK Neo-Geo AES - 正面视图 -->
  <!-- 机身主体 - 黑色 -->
  <rect x="50" y="70" width="300" height="180" rx="10" fill="#1a1a1a" stroke="#0f0f0f" stroke-width="2"/>
  
  <!-- 卡带槽 -->
  <rect x="70" y="90" width="180" height="130" rx="6" fill="#2a2a2a"/>
  <rect x="80" y="100" width="160" height="110" rx="4" fill="#1a1a1a"/>
  
  <!-- 卡带插槽 -->
  <rect x="100" y="115" width="120" height="80" rx="3" fill="#333"/>
  <text x="160" y="160" text-anchor="middle" fill="#666" font-size="8">CARTRIDGE</text>
  
  <!-- 手柄接口 -->
  <rect x="270" y="100" width="60" height="100" rx="4" fill="#333"/>
  <rect x="282" y="115" width="18" height="70" rx="2" fill="#1a1a1a"/>
  <rect x="305" y="115" width="18" height="70" rx="2" fill="#1a1a1a"/>
  
  <!-- 电源指示灯 -->
  <circle cx="70" y="85" r="4" fill="#00cc00" opacity="0.8"/>
  
  <!-- NEO-GEO LOGO -->
  <text x="160" y="220" text-anchor="middle" fill="#e60012" font-size="16" font-weight="bold">NEO·GEO</text>
  
  <!-- AES 标识 -->
  <text x="300" y="220" text-anchor="middle" fill="#666" font-size="8">AES</text>
  
  <!-- 阴影效果 -->
  <ellipse cx="200" cy="265" rx="150" ry="10" fill="rgba(0,0,0,0.15)"/>
</svg>