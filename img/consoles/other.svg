<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- 其他游戏主机 - 占位符 -->
  <!-- 机身主体 -->
  <rect x="80" y="80" width="240" height="140" rx="12" fill="#4a4a4a" stroke="#3a3a3a" stroke-width="2"/>
  
  <!-- 顶部区域 -->
  <rect x="80" y="80" width="240" height="30" rx="12" fill="#5a5a5a"/>
  
  <!-- 屏幕区域 -->
  <rect x="110" y="120" width="180" height="70" rx="6" fill="#333"/>
  <rect x="115" y="125" width="170" height="60" rx="4" fill="#4a90d9"/>
  
  <!-- 屏幕内容 -->
  <text x="200" y="160" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">GAME CONSOLE</text>
  
  <!-- 控制区域 -->
  <rect x="120" y="200" width="160" height="15" rx="4" fill="#333"/>
  
  <!-- 指示灯 -->
  <circle cx="95" cy="95" r="4" fill="#00cc00" opacity="0.8"/>
  
  <!-- 文字 -->
  <text x="200" y="240" text-anchor="middle" fill="#888" font-size="10">其他主机</text>
  
  <!-- 阴影效果 -->
  <ellipse cx="200" cy="255" rx="120" ry="10" fill="rgba(0,0,0,0.12)"/>
</svg>