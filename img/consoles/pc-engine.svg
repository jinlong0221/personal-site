<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- NEC PC Engine - 正面视图 -->
  <!-- 机身主体 - 白色小型主机 -->
  <rect x="100" y="90" width="200" height="140" rx="12" fill="#f5f5f5" stroke="#ddd" stroke-width="2"/>
  
  <!-- 卡带槽 -->
  <rect x="130" y="110" width="140" height="80" rx="6" fill="#e8e8e8"/>
  <rect x="140" y="120" width="120" height="60" rx="4" fill="#f0f0f0"/>
  
  <!-- 卡带插入标识 -->
  <rect x="160" y="135" width="80" height="30" rx="2" fill="#ddd"/>
  <text x="200" y="155" text-anchor="middle" fill="#888" font-size="8">HuCARD</text>
  
  <!-- 手柄接口 -->
  <rect x="120" y="200" width="160" height="20" rx="4" fill="#e8e8e8"/>
  <rect x="140" y="205" width="50" height="10" rx="2" fill="#ccc"/>
  <rect x="210" y="205" width="50" height="10" rx="2" fill="#ccc"/>
  
  <!-- 电源指示灯 -->
  <circle cx="120" cy="100" r="4" fill="#00cc00" opacity="0.8"/>
  
  <!-- NEC LOGO -->
  <text x="200" y="105" text-anchor="middle" fill="#1e5fa8" font-size="10" font-weight="bold">NEC</text>
  
  <!-- PC Engine 标识 -->
  <text x="200" y="245" text-anchor="middle" fill="#666" font-size="11" font-weight="bold">PC Engine</text>
  
  <!-- 阴影效果 -->
  <ellipse cx="200" cy="250" rx="100" ry="8" fill="rgba(0,0,0,0.1)"/>
</svg>