<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Sony PlayStation Portal - 正面视图 -->
  <!-- 机身主体 - 白色掌机 -->
  <rect x="50" y="60" width="300" height="180" rx="16" fill="#f5f5f5" stroke="#ddd" stroke-width="2"/>
  
  <!-- 屏幕 -->
  <rect x="70" y="80" width="260" height="130" rx="10" fill="#111"/>
  <rect x="75" y="85" width="250" height="120" rx="8" fill="#4a90d9"/>
  
  <!-- 屏幕内容 -->
  <text x="200" y="150" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">PlayStation Portal</text>
  <text x="200" y="170" text-anchor="middle" fill="#fff" font-size="10">Remote Play</text>
  
  <!-- 左侧控制 -->
  <circle cx="70" cy="100" r="12" fill="#ddd"/>
  <rect x="60" y="170" width="20" height="8" rx="2" fill="#ddd"/>
  <rect x="66" y="164" width="8" height="20" rx="2" fill="#ddd"/>
  
  <!-- 右侧控制 -->
  <circle cx="330" cy="100" r="12" fill="#ddd"/>
  <circle cx="320" cy="185" r="7" fill="#e60012"/>
  <circle cx="335" cy="175" r="7" fill="#00a651"/>
  <circle cx="305" cy="175" r="7" fill="#ffd700"/>
  <circle cx="320" cy="165" r="7" fill="#0066cc"/>
  
  <!-- PS LOGO -->
  <text x="200" y="75" text-anchor="middle" fill="#0066cc" font-size="10" font-weight="bold">PlayStation</text>
  
  <!-- 阴影效果 -->
  <ellipse cx="200" cy="255" rx="150" ry="10" fill="rgba(0,0,0,0.1)"/>
</svg>