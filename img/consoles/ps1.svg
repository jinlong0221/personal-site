<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Sony PlayStation 1 - 正面视图 -->
  <!-- 机身主体 - 灰色 -->
  <rect x="60" y="70" width="280" height="170" rx="8" fill="#9a9a9a" stroke="#7a7a7a" stroke-width="2"/>
  
  <!-- 顶部区域 -->
  <rect x="60" y="70" width="280" height="30" rx="8" fill="#8a8a8a"/>
  
  <!-- 光驱盖 -->
  <rect x="80" y="110" width="140" height="100" rx="6" fill="#7a7a7a" stroke="#6a6a6a" stroke-width="1"/>
  <rect x="90" y="120" width="120" height="80" rx="4" fill="#6a6a6a"/>
  <circle cx="150" cy="160" r="25" fill="#5a5a5a" stroke="#4a4a4a" stroke-width="1"/>
  <circle cx="150" cy="160" r="8" fill="#3a3a3a"/>
  
  <!-- CD标志 -->
  <text x="150" y="195" text-anchor="middle" fill="#aaa" font-size="6">CD-ROM</text>
  
  <!-- 电源按钮 -->
  <rect x="250" y="85" width="70" height="25" rx="4" fill="#666"/>
  <circle cx="270" cy="97" r="8" fill="#4a4a4a"/>
  <text x="270" y="100" text-anchor="middle" fill="#ccc" font-size="5">POWER</text>
  
  <!-- 重置按钮 -->
  <circle cx="310" cy="97" r="8" fill="#4a4a4a"/>
  <text x="310" y="100" text-anchor="middle" fill="#ccc" font-size="5">RESET</text>
  
  <!-- 出仓按钮 -->
  <rect x="250" y="120" width="70" height="20" rx="4" fill="#666"/>
  <rect x="260" y="125" width="50" height="10" rx="2" fill="#4a4a4a"/>
  <text x="285" y="150" text-anchor="middle" fill="#aaa" font-size="6">OPEN</text>
  
  <!-- 手柄接口 -->
  <rect x="80" y="220" width="240" height="15" rx="4" fill="#7a7a7a"/>
  <rect x="95" y="223" width="40" height="9" rx="2" fill="#4a4a4a"/>
  <rect x="150" y="223" width="40" height="9" rx="2" fill="#4a4a4a"/>
  
  <!-- PlayStation LOGO -->
  <text x="285" y="190" text-anchor="middle" fill="#e60012" font-size="10" font-weight="bold">PlayStation</text>
  
  <!-- SONY LOGO -->
  <text x="285" y="170" text-anchor="middle" fill="#333" font-size="8" font-weight="bold">SONY</text>
  
  <!-- 阴影效果 -->
  <ellipse cx="200" cy="250" rx="140" ry="10" fill="rgba(0,0,0,0.12)"/>
</svg>