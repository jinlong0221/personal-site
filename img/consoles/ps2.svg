<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Sony PlayStation 2 - 正面视图 -->
  <!-- 机身主体 - 黑色立式 -->
  <path d="M140 30 L260 30 L280 50 L280 250 L120 250 L120 50 Z" fill="#1a1a1a" stroke="#0f0f0f" stroke-width="2"/>
  
  <!-- 顶部光驱区域 -->
  <rect x="140" y="60" width="120" height="100" rx="6" fill="#2a2a2a"/>
  <rect x="150" y="70" width="100" height="80" rx="4" fill="#1a1a1a"/>
  
  <!-- CD/DVD标识 -->
  <circle cx="200" cy="110" r="25" fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="200" cy="110" r="8" fill="#333"/>
  <text x="200" y="145" text-anchor="middle" fill="#555" font-size="6">DVD</text>
  
  <!-- 指示灯 -->
  <circle cx="240" cy="75" r="4" fill="#00cc00" opacity="0.8"/>
  
  <!-- 手柄接口 -->
  <rect x="150" y="170" width="100" height="25" rx="4" fill="#2a2a2a"/>
  <rect x="160" y="175" width="35" height="15" rx="2" fill="#0f0f0f"/>
  <rect x="205" y="175" width="35" height="15" rx="2" fill="#0f0f0f"/>
  <text x="178" y="185" text-anchor="middle" fill="#555" font-size="5">1</text>
  <text x="223" y="185" text-anchor="middle" fill="#555" font-size="5">2</text>
  
  <!-- USB接口 -->
  <rect x="160" y="205" width="25" height="8" rx="1" fill="#333"/>
  <rect x="215" y="205" width="25" height="8" rx="1" fill="#333"/>
  <text x="200" y="215" text-anchor="middle" fill="#444" font-size="5">USB</text>
  
  <!-- 重置/弹出按钮 -->
  <rect x="165" y="230" width="70" height="10" rx="2" fill="#333"/>
  <line x1="185" y1="230" x2="185" y2="240" stroke="#222" stroke-width="1"/>
  <text x="175" y="237" text-anchor="middle" fill="#666" font-size="4">RESET</text>
  <text x="215" y="237" text-anchor="middle" fill="#666" font-size="4">EJECT</text>
  
  <!-- PlayStation 2 LOGO -->
  <text x="200" y="25" text-anchor="middle" fill="#0066cc" font-size="10" font-weight="bold">PlayStation®2</text>
  
  <!-- 阴影效果 -->
  <ellipse cx="200" cy="265" rx="80" ry="10" fill="rgba(0,0,0,0.18)"/>
</svg>