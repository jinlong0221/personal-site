<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Sony PlayStation 3 - 正面视图 -->
  <!-- 机身主体 - 黑色圆润设计 -->
  <path d="M70 80 Q70 60 90 60 L310 60 Q330 60 330 80 L340 220 Q340 240 320 240 L80 240 Q60 240 60 220 Z" fill="#1a1a1a" stroke="#0f0f0f" stroke-width="2"/>
  
  <!-- 光驱槽 -->
  <rect x="100" y="100" width="200" height="15" rx="3" fill="#2a2a2a"/>
  <rect x="105" y="103" width="190" height="9" rx="2" fill="#1a1a1a"/>
  
  <!-- 光驱指示灯 -->
  <circle cx="310" cy="107" r="3" fill="#0066cc" opacity="0.8"/>
  
  <!-- 硬盘指示灯 -->
  <circle cx="90" cy="107" r="3" fill="#00cc00" opacity="0.6"/>
  
  <!-- PlayStation 3 LOGO -->
  <text x="200" y="145" text-anchor="middle" fill="#666" font-size="14" font-weight="bold" font-family="Arial, sans-serif">PlayStation®3</text>
  
  <!-- 手柄接口区域 -->
  <rect x="140" y="165" width="120" height="50" rx="6" fill="#2a2a2a"/>
  
  <!-- USB接口 -->
  <rect x="155" y="175" width="30" height="10" rx="2" fill="#0f0f0f"/>
  <rect x="215" y="175" width="30" height="10" rx="2" fill="#0f0f0f"/>
  <text x="170" y="183" text-anchor="middle" fill="#444" font-size="4">USB</text>
  <text x="230" y="183" text-anchor="middle" fill="#444" font-size="4">USB</text>
  
  <!-- 电源按钮 -->
  <circle cx="200" cy="200" r="8" fill="#333"/>
  <circle cx="200" cy="200" r="5" fill="#222"/>
  
  <!-- 散热孔 -->
  <g>
    <line x1="90" y1="225" x2="90" y2="235" stroke="#333" stroke-width="1"/>
    <line x1="95" y1="225" x2="95" y2="235" stroke="#333" stroke-width="1"/>
    <line x1="100" y1="225" x2="100" y2="235" stroke="#333" stroke-width="1"/>
  </g>
  <g>
    <line x1="300" y1="225" x2="300" y2="235" stroke="#333" stroke-width="1"/>
    <line x1="305" y1="225" x2="305" y2="235" stroke="#333" stroke-width="1"/>
    <line x1="310" y1="225" x2="310" y2="235" stroke="#333" stroke-width="1"/>
  </g>
  
  <!-- SONY LOGO -->
  <text x="200" y="85" text-anchor="middle" fill="#888" font-size="8" font-weight="bold">SONY</text>
  
  <!-- 阴影效果 -->
  <ellipse cx="200" cy="255" rx="140" ry="10" fill="rgba(0,0,0,0.15)"/>
</svg>