<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Sony PlayStation 4 - 正面视图 -->
  <!-- 机身主体 - 斜面设计 -->
  <path d="M50 100 L350 100 L380 220 L20 220 Z" fill="#1a1a1a" stroke="#0f0f0f" stroke-width="2"/>
  
  <!-- 中部凹槽光驱 -->
  <rect x="120" y="120" width="160" height="60" rx="6" fill="#2a2a2a"/>
  <rect x="130" y="130" width="140" height="40" rx="4" fill="#1a1a1a"/>
  
  <!-- 光驱指示灯条 -->
  <rect x="130" y="125" width="140" height="3" fill="#0066cc" opacity="0.6"/>
  
  <!-- PlayStation LOGO -->
  <text x="200" y="155" text-anchor="middle" fill="#444" font-size="12" font-weight="bold">PlayStation®4</text>
  
  <!-- USB接口 -->
  <rect x="80" y="170" width="25" height="8" rx="2" fill="#333"/>
  <rect x="295" y="170" width="25" height="8" rx="2" fill="#333"/>
  
  <!-- 电源按钮 -->
  <circle cx="50" cy="160" r="6" fill="#333"/>
  
  <!-- 弹出按钮 -->
  <circle cx="350" cy="160" r="6" fill="#333"/>
  
  <!-- SONY LOGO -->
  <text x="200" y="200" text-anchor="middle" fill="#555" font-size="10" font-weight="bold">SONY</text>
  
  <!-- 底部装饰 -->
  <rect x="30" y="210" width="340" height="4" fill="#222"/>
  
  <!-- 阴影效果 -->
  <ellipse cx="200" cy="245" rx="180" ry="12" fill="rgba(0,0,0,0.15)"/>
</svg>