<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Sony PlayStation 5 - 正面视图 -->
  <!-- 机身主体 - 白色+黑色设计 -->
  <path d="M100 40 L300 40 Q340 40 340 80 L340 240 Q340 260 300 260 L100 260 Q60 260 60 240 L60 80 Q60 40 100 40 Z" fill="#f0f0f0" stroke="#ddd" stroke-width="2"/>
  
  <!-- 中间黑色面板 -->
  <path d="M130 60 L270 60 L280 200 L120 200 Z" fill="#1a1a1a"/>
  
  <!-- 光驱区域（数字版无此部分，此处为光驱版） -->
  <rect x="145" y="75" width="110" height="60" rx="6" fill="#2a2a2a"/>
  <rect x="155" y="85" width="90" height="40" rx="4" fill="#1a1a1a"/>
  
  <!-- 蓝光指示灯 -->
  <rect x="140" y="145" width="120" height="4" fill="#0066cc" opacity="0.7"/>
  
  <!-- USB接口 -->
  <rect x="155" y="165" width="25" height="8" rx="2" fill="#333"/>
  <rect x="220" y="165" width="25" height="8" rx="2" fill="#333"/>
  
  <!-- PlayStation LOGO -->
  <text x="200" y="200" text-anchor="middle" fill="#666" font-size="10" font-weight="bold">PlayStation®5</text>
  
  <!-- 底部装饰 -->
  <rect x="100" y="225" width="200" height="20" rx="4" fill="#f0f0f0"/>
  
  <!-- SONY LOGO -->
  <text x="200" y="50" text-anchor="middle" fill="#888" font-size="8" font-weight="bold">SONY</text>
  
  <!-- 散热孔 -->
  <g>
    <line x1="110" y1="230" x2="110" y2="240" stroke="#ccc" stroke-width="1"/>
    <line x1="115" y1="230" x2="115" y2="240" stroke="#ccc" stroke-width="1"/>
    <line x1="120" y1="230" x2="120" y2="240" stroke="#ccc" stroke-width="1"/>
  </g>
  <g>
    <line x1="280" y1="230" x2="280" y2="240" stroke="#ccc" stroke-width="1"/>
    <line x1="285" y1="230" x2="285" y2="240" stroke="#ccc" stroke-width="1"/>
    <line x1="290" y1="230" x2="290" y2="240" stroke="#ccc" stroke-width="1"/>
  </g>
  
  <!-- 阴影效果 -->
  <ellipse cx="200" cy="275" rx="140" ry="10" fill="rgba(0,0,0,0.1)"/>
</svg>