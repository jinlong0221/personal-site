<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- ASUS ROG Ally - 正面视图 -->
  <!-- 机身主体 - 黑色掌机 -->
  <rect x="50" y="50" width="300" height="200" rx="16" fill="#1a1a1a" stroke="#0f0f0f" stroke-width="2"/>
  
  <!-- 屏幕 -->
  <rect x="75" y="70" width="250" height="140" rx="8" fill="#111"/>
  <rect x="80" y="75" width="240" height="130" rx="6" fill="#4a90d9"/>
  
  <!-- 屏幕内容 -->
  <text x="200" y="145" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">ROG ALLY</text>
  <text x="200" y="165" text-anchor="middle" fill="#fff" font-size="10">Gaming Handheld</text>
  
  <!-- 左侧控制 -->
  <!-- 左摇杆 -->
  <circle cx="75" cy="90" r="16" fill="#333"/>
  <circle cx="75" cy="90" r="11" fill="#222"/>
  
  <!-- 十字键 -->
  <rect x="55" y="180" width="40" height="14" rx="4" fill="#333"/>
  <rect x="68" y="167" width="14" height="40" rx="4" fill="#333"/>
  
  <!-- 右侧控制 -->
  <!-- 右摇杆 -->
  <circle cx="325" cy="90" r="16" fill="#333"/>
  <circle cx="325" cy="90" r="11" fill="#222"/>
  
  <!-- A/B/X/Y按钮 -->
  <circle cx="325" cy="180" r="9" fill="#ff0055"/>
  <circle cx="345" cy="200" r="9" fill="#00cc66"/>
  <circle cx="325" cy="220" r="9" fill="#0088ff"/>
  <circle cx="305" cy="200" r="9" fill="#ffcc00"/>
  
  <!-- ROG LOGO -->
  <text x="200" y="65" text-anchor="middle" fill="#ff0055" font-size="12" font-weight="bold">ROG</text>
  
  <!-- 阴影效果 -->
  <ellipse cx="200" cy="265" rx="150" ry="10" fill="rgba(0,0,0,0.15)"/>
</svg>