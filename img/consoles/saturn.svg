<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Sega Saturn - 正面视图 -->
  <!-- 机身主体 - 灰黑色 -->
  <rect x="50" y="70" width="300" height="170" rx="10" fill="#2a2a2a" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- 光驱槽 -->
  <rect x="70" y="90" width="200" height="60" rx="6" fill="#333"/>
  <rect x="80" y="100" width="180" height="40" rx="4" fill="#1a1a1a"/>
  
  <!-- CD标识 -->
  <circle cx="170" cy="120" r="18" fill="none" stroke="#444" stroke-width="2"/>
  <circle cx="170" cy="120" r="6" fill="#333"/>
  <text x="170" y="155" text-anchor="middle" fill="#555" font-size="6">CD-ROM</text>
  
  <!-- 手柄接口 -->
  <rect x="290" y="100" width="40" height="50" rx="4" fill="#333"/>
  <rect x="298" y="110" width="12" height="30" rx="2" fill="#1a1a1a"/>
  <rect x="314" y="110" width="12" height="30" rx="2" fill="#1a1a1a"/>
  
  <!-- 复位/弹出按钮 -->
  <rect x="290" y="165" width="40" height="30" rx="4" fill="#333"/>
  <rect x="295" y="170" width="14" height="10" rx="2" fill="#2a2a2a"/>
  <rect x="311" y="170" width="14" height="10" rx="2" fill="#2a2a2a"/>
  <text x="295" y="190" text-anchor="middle" fill="#666" font-size="4">RESET</text>
  <text x="318" y="190" text-anchor="middle" fill="#666" font-size="4">OPEN</text>
  
  <!-- 控制区域 -->
  <!-- 电源开关 -->
  <rect x="70" y="170" width="50" height="15" rx="4" fill="#333"/>
  <rect x="75" y="175" width="20" height="5" fill="#222"/>
  <text x="95" y="183" text-anchor="middle" fill="#666" font-size="5">POWER</text>
  
  <!-- SEGA SATURN LOGO -->
  <text x="170" y="195" text-anchor="middle" fill="#1e5fa8" font-size="14" font-weight="bold">SEGA</text>
  <text x="170" y="210" text-anchor="middle" fill="#888" font-size="11" font-weight="bold">SATURN</text>
  
  <!-- 阴影效果 -->
  <ellipse cx="200" cy="255" rx="150" ry="10" fill="rgba(0,0,0,0.15)"/>
</svg>