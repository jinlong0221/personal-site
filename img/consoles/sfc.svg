<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Super Famicom (SFC) - 超级任天堂 正面视图 -->
  <!-- 机身主体 - 浅灰色 -->
  <path d="M80 80 L320 80 L340 120 L340 230 L60 230 L60 120 Z" fill="#c8c8c8" stroke="#999" stroke-width="2"/>
  
  <!-- 顶部深灰色区域 -->
  <path d="M80 80 L320 80 L340 100 L60 100 Z" fill="#6b6b6b"/>
  
  <!-- 卡带槽盖板 -->
  <rect x="100" y="115" width="200" height="50" rx="4" fill="#9a9a9a" stroke="#777" stroke-width="1"/>
  <rect x="110" y="120" width="180" height="40" rx="3" fill="#7a7a7a"/>
  
  <!-- 卡带槽开口 -->
  <rect x="140" y="125" width="120" height="30" rx="2" fill="#333"/>
  
  <!-- 电源按钮 -->
  <ellipse cx="300" cy="90" rx="20" ry="10" fill="#8b0000" stroke="#6b0000" stroke-width="1"/>
  <text x="300" y="94" text-anchor="middle" fill="#fff" font-size="7" font-weight="bold">POWER</text>
  
  <!-- 重置按钮 -->
  <ellipse cx="300" cy="140" rx="16" ry="8" fill="#555" stroke="#333" stroke-width="1"/>
  <text x="300" y="144" text-anchor="middle" fill="#ddd" font-size="6" font-weight="bold">RESET</text>
  
  <!-- 弹出按钮 -->
  <ellipse cx="300" cy="165" rx="14" ry="7" fill="#555" stroke="#333" stroke-width="1"/>
  <text x="300" y="168" text-anchor="middle" fill="#ddd" font-size="5" font-weight="bold">EJECT</text>
  
  <!-- 手柄接口区域 -->
  <rect x="80" y="190" width="240" height="30" rx="4" fill="#8a8a8a"/>
  
  <!-- 手柄接口 -->
  <ellipse cx="140" cy="205" rx="22" ry="12" fill="#444"/>
  <ellipse cx="140" cy="205" rx="16" ry="9" fill="#333"/>
  
  <ellipse cx="200" cy="205" rx="22" ry="12" fill="#444"/>
  <ellipse cx="200" cy="205" rx="16" ry="9" fill="#333"/>
  
  <ellipse cx="260" cy="205" rx="22" ry="12" fill="#444"/>
  <ellipse cx="260" cy="205" rx="16" ry="9" fill="#333"/>
  
  <!-- SUPER NINTENDO LOGO -->
  <text x="200" y="180" text-anchor="middle" fill="#1e5fa8" font-size="13" font-weight="bold" font-family="Arial, sans-serif">SUPER NINTENDO</text>
  <text x="200" y="195" text-anchor="middle" fill="#888" font-size="8" font-family="Arial, sans-serif">ENTERTAINMENT SYSTEM</text>
  
  <!-- 接口标签 -->
  <text x="140" y="225" text-anchor="middle" fill="#666" font-size="6">1P</text>
  <text x="200" y="225" text-anchor="middle" fill="#666" font-size="6">2P</text>
  <text x="260" y="225" text-anchor="middle" fill="#666" font-size="6">EXT</text>
  
  <!-- 阴影效果 -->
  <ellipse cx="200" cy="245" rx="130" ry="8" fill="rgba(0,0,0,0.15)"/>
</svg>