<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Valve Steam Deck - 正面视图 -->
  <!-- 机身主体 - 黑色掌机 -->
  <rect x="50" y="50" width="300" height="200" rx="18" fill="#1a1a1a" stroke="#0f0f0f" stroke-width="2"/>
  
  <!-- 屏幕 -->
  <rect x="80" y="70" width="240" height="140" rx="8" fill="#111"/>
  <rect x="85" y="75" width="230" height="130" rx="6" fill="#4a90d9"/>
  
  <!-- 屏幕内容 -->
  <text x="200" y="145" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">STEAM DECK</text>
  <text x="200" y="165" text-anchor="middle" fill="#fff" font-size="10">Portable PC Gaming</text>
  
  <!-- 左侧控制 -->
  <!-- 左摇杆 -->
  <circle cx="75" cy="90" r="15" fill="#333"/>
  <circle cx="75" cy="90" r="10" fill="#222"/>
  
  <!-- 十字键 -->
  <rect x="60" y="180" width="30" height="10" rx="3" fill="#333"/>
  <rect x="70" y="170" width="10" height="30" rx="3" fill="#333"/>
  
  <!-- 触摸板 -->
  <ellipse cx="75" cy="135" rx="12" ry="8" fill="#2a2a2a"/>
  
  <!-- 右侧控制 -->
  <!-- 右摇杆 -->
  <circle cx="325" cy="180" r="15" fill="#333"/>
  <circle cx="325" cy="180" r="10" fill="#222"/>
  
  <!-- 触摸板 -->
  <ellipse cx="325" cy="135" rx="12" ry="8" fill="#2a2a2a"/>
  
  <!-- A/B/X/Y按钮 -->
  <circle cx="335" cy="80" r="8" fill="#333"/>
  <circle cx="335" cy="100" r="8" fill="#333"/>
  <circle cx="315" cy="90" r="8" fill="#333"/>
  <circle cx="355" cy="90" r="8" fill="#333"/>
  
  <!-- STEAM LOGO -->
  <text x="200" y="65" text-anchor="middle" fill="#66c0f4" font-size="10" font-weight="bold">STEAM</text>
  
  <!-- 阴影效果 -->
  <ellipse cx="200" cy="265" rx="150" ry="10" fill="rgba(0,0,0,0.15)"/>
</svg>