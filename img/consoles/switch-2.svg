<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Nintendo Switch 2 - 正面视图 -->
  <!-- 主体屏幕区域 -->
  <rect x="65" y="50" width="270" height="180" rx="14" fill="#2a2a2a" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- 大屏幕 -->
  <rect x="75" y="60" width="250" height="160" rx="10" fill="#1a1a1a"/>
  <rect x="80" y="65" width="240" height="150" rx="8" fill="#222"/>
  
  <!-- 屏幕内容 -->
  <text x="200" y="140" text-anchor="middle" fill="#e60012" font-size="28" font-weight="bold">SWITCH 2</text>
  <text x="200" y="165" text-anchor="middle" fill="#888" font-size="11">Next Generation</text>
  
  <!-- 左Joy-Con -->
  <rect x="30" y="50" width="55" height="180" rx="12" fill="#444" stroke="#333" stroke-width="2"/>
  
  <!-- 左摇杆 -->
  <circle cx="57" cy="90" r="22" fill="#333" stroke="#222" stroke-width="1.5"/>
  <circle cx="57" cy="90" r="15" fill="#2a2a2a"/>
  
  <!-- 左方向键 -->
  <rect x="45" y="145" width="24" height="8" rx="2" fill="#333"/>
  <rect x="53" y="137" width="8" height="24" rx="2" fill="#333"/>
  
  <!-- 左按钮 -->
  <circle cx="57" cy="195" r="7" fill="#333"/>
  
  <!-- 右Joy-Con -->
  <rect x="315" y="50" width="55" height="180" rx="12" fill="#444" stroke="#333" stroke-width="2"/>
  
  <!-- 右摇杆 -->
  <circle cx="342" cy="145" r="22" fill="#333" stroke="#222" stroke-width="1.5"/>
  <circle cx="342" cy="145" r="15" fill="#2a2a2a"/>
  
  <!-- 右ABXY按钮 -->
  <circle cx="342" cy="90" r="8" fill="#e60012"/>
  <circle cx="327" cy="105" r="8" fill="#00a651"/>
  <circle cx="357" cy="105" r="8" fill="#0066cc"/>
  <circle cx="342" cy="120" r="8" fill="#ffd700"/>
  
  <!-- 右按钮 -->
  <circle cx="342" cy="195" r="7" fill="#333"/>
  
  <!-- 底部指示灯 -->
  <circle cx="200" cy="240" r="4" fill="#00cc00" opacity="0.8"/>
  
  <!-- 阴影效果 -->
  <ellipse cx="200" cy="250" rx="175" ry="10" fill="rgba(0,0,0,0.15)"/>
</svg>