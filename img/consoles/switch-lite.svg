<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Nintendo Switch Lite - 正面视图 -->
  <!-- 一体化机身 -->
  <path d="M70 60 L330 60 Q340 60 340 70 L340 220 Q340 230 330 230 L70 230 Q60 230 60 220 L60 70 Q60 60 70 60 Z" fill="#4a90d9" stroke="#3a7ab8" stroke-width="2"/>
  
  <!-- 屏幕 -->
  <rect x="80" y="70" width="240" height="140" rx="6" fill="#1a1a1a"/>
  <rect x="85" y="75" width="230" height="130" rx="4" fill="#222"/>
  
  <!-- 屏幕内容 -->
  <text x="200" y="145" text-anchor="middle" fill="#4a90d9" font-size="18" font-weight="bold">SWITCH LITE</text>
  
  <!-- 左侧控制区 -->
  <!-- 左摇杆 -->
  <circle cx="100" cy="95" r="14" fill="#3a7ab8" stroke="#2a5a88" stroke-width="1.5"/>
  <circle cx="100" cy="95" r="9" fill="#2a5a88"/>
  
  <!-- 左方向键 -->
  <rect x="90" y="220" width="20" height="6" rx="2" fill="#3a7ab8"/>
  <rect x="97" y="213" width="6" height="20" rx="2" fill="#3a7ab8"/>
  
  <!-- 右侧控制区 -->
  <!-- 右摇杆 -->
  <circle cx="300" cy="220" r="14" fill="#3a7ab8" stroke="#2a5a88" stroke-width="1.5"/>
  <circle cx="300" cy="220" r="9" fill="#2a5a88"/>
  
  <!-- 右ABXY按钮 -->
  <circle cx="300" cy="95" r="5" fill="#3a7ab8"/>
  <circle cx="288" cy="105" r="5" fill="#3a7ab8"/>
  <circle cx="312" cy="105" r="5" fill="#3a7ab8"/>
  <circle cx="300" cy="115" r="5" fill="#3a7ab8"/>
  
  <!-- 扬声器孔 -->
  <g>
    <line x1="75" y1="65" x2="75" y2="70" stroke="#3a7ab8" stroke-width="1"/>
    <line x1="80" y1="65" x2="80" y2="70" stroke="#3a7ab8" stroke-width="1"/>
    <line x1="85" y1="65" x2="85" y2="70" stroke="#3a7ab8" stroke-width="1"/>
  </g>
  <g>
    <line x1="315" y1="65" x2="315" y2="70" stroke="#3a7ab8" stroke-width="1"/>
    <line x1="320" y1="65" x2="320" y2="70" stroke="#3a7ab8" stroke-width="1"/>
    <line x1="325" y1="65" x2="325" y2="70" stroke="#3a7ab8" stroke-width="1"/>
  </g>
  
  <!-- 阴影效果 -->
  <ellipse cx="200" cy="248" rx="140" ry="8" fill="rgba(0,0,0,0.12)"/>
</svg>