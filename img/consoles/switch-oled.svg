<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Nintendo Switch OLED - 正面视图 -->
  <!-- 主体屏幕区域 -->
  <rect x="70" y="55" width="260" height="170" rx="12" fill="#2a2a2a" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- OLED大屏幕 -->
  <rect x="80" y="65" width="240" height="150" rx="8" fill="#1a1a1a"/>
  <rect x="85" y="70" width="230" height="140" rx="6" fill="#4a90d9"/>
  
  <!-- 屏幕内容 -->
  <text x="200" y="140" text-anchor="middle" fill="#fff" font-size="22" font-weight="bold">SWITCH</text>
  <text x="200" y="165" text-anchor="middle" fill="#fff" font-size="12">OLED Model</text>
  
  <!-- 左Joy-Con (白色) -->
  <rect x="35" y="55" width="50" height="170" rx="10" fill="#e8e8e8" stroke="#d8d8d8" stroke-width="2"/>
  
  <!-- 左摇杆 -->
  <circle cx="60" cy="95" r="20" fill="#4a4a4a" stroke="#333" stroke-width="1.5"/>
  <circle cx="60" cy="95" r="13" fill="#333"/>
  
  <!-- 左方向键 -->
  <rect x="48" y="138" width="24" height="10" rx="3" fill="#4a4a4a"/>
  <rect x="55" y="131" width="10" height="24" rx="3" fill="#4a4a4a"/>
  
  <!-- 左按钮 -->
  <circle cx="60" cy="185" r="6" fill="#4a4a4a"/>
  
  <!-- 右Joy-Con (白色) -->
  <rect x="315" y="55" width="50" height="170" rx="10" fill="#e8e8e8" stroke="#d8d8d8" stroke-width="2"/>
  
  <!-- 右摇杆 -->
  <circle cx="340" cy="140" r="20" fill="#4a4a4a" stroke="#333" stroke-width="1.5"/>
  <circle cx="340" cy="140" r="13" fill="#333"/>
  
  <!-- 右ABXY按钮 -->
  <circle cx="340" cy="95" r="7" fill="#4a4a4a"/>
  <circle cx="325" cy="110" r="7" fill="#4a4a4a"/>
  <circle cx="355" cy="110" r="7" fill="#4a4a4a"/>
  <circle cx="340" cy="125" r="7" fill="#4a4a4a"/>
  
  <!-- 右按钮 -->
  <circle cx="340" cy="185" r="6" fill="#4a4a4a"/>
  
  <!-- 底部支架区域 -->
  <rect x="150" y="230" width="100" height="8" rx="2" fill="#3a3a3a"/>
  
  <!-- 阴影效果 -->
  <ellipse cx="200" cy="248" rx="170" ry="8" fill="rgba(0,0,0,0.12)"/>
</svg>