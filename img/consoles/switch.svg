<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Nintendo Switch - 正面视图 -->
  <!-- 主体屏幕区域 -->
  <rect x="80" y="60" width="240" height="160" rx="12" fill="#2a2a2a" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- 屏幕 -->
  <rect x="95" y="75" width="210" height="130" rx="8" fill="#1a1a1a"/>
  <rect x="100" y="80" width="200" height="120" rx="6" fill="#4a90d9"/>
  
  <!-- 屏幕内容 -->
  <text x="200" y="145" text-anchor="middle" fill="#fff" font-size="24" font-weight="bold">SWITCH</text>
  
  <!-- 左Joy-Con (灰色) -->
  <rect x="50" y="60" width="45" height="160" rx="8" fill="#6b6b6b" stroke="#5a5a5a" stroke-width="2"/>
  
  <!-- 左摇杆 -->
  <circle cx="72" cy="100" r="18" fill="#4a4a4a" stroke="#333" stroke-width="1.5"/>
  <circle cx="72" cy="100" r="12" fill="#333"/>
  
  <!-- 左方向键 -->
  <rect x="62" y="140" width="20" height="8" rx="2" fill="#4a4a4a"/>
  <rect x="67" y="135" width="10" height="18" rx="2" fill="#4a4a4a"/>
  
  <!-- 左按钮 -->
  <circle cx="72" cy="175" r="5" fill="#4a4a4a"/>
  
  <!-- 右Joy-Con (灰色) -->
  <rect x="305" y="60" width="45" height="160" rx="8" fill="#6b6b6b" stroke="#5a5a5a" stroke-width="2"/>
  
  <!-- 右摇杆 -->
  <circle cx="327" cy="140" r="18" fill="#4a4a4a" stroke="#333" stroke-width="1.5"/>
  <circle cx="327" cy="140" r="12" fill="#333"/>
  
  <!-- 右ABXY按钮 -->
  <circle cx="327" cy="100" r="6" fill="#4a4a4a"/>
  <circle cx="315" cy="112" r="6" fill="#4a4a4a"/>
  <circle cx="339" cy="112" r="6" fill="#4a4a4a"/>
  <circle cx="327" cy="124" r="6" fill="#4a4a4a"/>
  
  <!-- 右按钮 -->
  <circle cx="327" cy="175" r="5" fill="#4a4a4a"/>
  
  <!-- 底部散热孔 -->
  <g>
    <line x1="140" y1="225" x2="145" y2="225" stroke="#333" stroke-width="1"/>
    <line x1="150" y1="225" x2="155" y2="225" stroke="#333" stroke-width="1"/>
    <line x1="160" y1="225" x2="165" y2="225" stroke="#333" stroke-width="1"/>
    <line x1="235" y1="225" x2="240" y2="225" stroke="#333" stroke-width="1"/>
    <line x1="245" y1="225" x2="250" y2="225" stroke="#333" stroke-width="1"/>
    <line x1="255" y1="225" x2="260" y2="225" stroke="#333" stroke-width="1"/>
  </g>
  
  <!-- 阴影效果 -->
  <ellipse cx="200" cy="245" rx="160" ry="8" fill="rgba(0,0,0,0.12)"/>
</svg>