<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Sony PlayStation Vita - 正面视图 -->
  <!-- 机身主体 -->
  <rect x="70" y="60" width="260" height="180" rx="16" fill="#1a1a1a" stroke="#0f0f0f" stroke-width="2"/>
  
  <!-- 大屏幕 -->
  <rect x="85" y="75" width="230" height="130" rx="8" fill="#111"/>
  <rect x="90" y="80" width="220" height="120" rx="6" fill="#4a90d9"/>
  
  <!-- 屏幕内容 -->
  <text x="200" y="145" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">PlayStation</text>
  <text x="200" y="165" text-anchor="middle" fill="#fff" font-size="12">Vita</text>
  
  <!-- 左侧控制 -->
  <!-- 左摇杆 -->
  <circle cx="100" cy="100" r="12" fill="#333"/>
  <circle cx="100" cy="100" r="8" fill="#222"/>
  
  <!-- 方向键 -->
  <rect x="90" y="200" width="20" height="8" rx="2" fill="#333"/>
  <rect x="96" y="194" width="8" height="20" rx="2" fill="#333"/>
  
  <!-- 右侧控制 -->
  <!-- 右摇杆 -->
  <circle cx="300" cy="100" r="12" fill="#333"/>
  <circle cx="300" cy="100" r="8" fill="#222"/>
  
  <!-- ABXY按钮 -->
  <circle cx="295" cy="195" r="7" fill="#e60012"/>
  <circle cx="285" cy="205" r="7" fill="#00a651"/>
  <circle cx="305" cy="205" r="7" fill="#ffd700"/>
  <circle cx="295" cy="215" r="7" fill="#0066cc"/>
  
  <!-- 触摸板区域标识（背面） -->
  <rect x="130" y="250" width="140" height="6" rx="3" fill="#333"/>
  <text x="200" y="255" text-anchor="middle" fill="#666" font-size="4">TOUCH PAD</text>
  
  <!-- START/SELECT -->
  <rect x="185" y="210" width="30" height="6" rx="3" fill="#333"/>
  <text x="200" y="207" text-anchor="middle" fill="#555" font-size="4">START SELECT</text>
  
  <!-- SONY LOGO -->
  <text x="200" y="70" text-anchor="middle" fill="#666" font-size="7" font-weight="bold">SONY</text>
  
  <!-- 阴影效果 -->
  <ellipse cx="200" cy="265" rx="130" ry="8" fill="rgba(0,0,0,0.1)"/>
</svg>