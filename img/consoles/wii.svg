<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Nintendo Wii - 正面视图 -->
  <!-- 机身主体 - 白色立式设计 -->
  <rect x="130" y="40" width="140" height="220" rx="8" fill="#f5f5f5" stroke="#ddd" stroke-width="2"/>
  
  <!-- 顶部区域 -->
  <rect x="130" y="40" width="140" height="30" rx="8" fill="#e8e8e8"/>
  
  <!-- 光驱槽 -->
  <rect x="145" y="85" width="110" height="12" rx="2" fill="#333"/>
  <rect x="148" y="88" width="104" height="6" rx="1" fill="#1a1a1a"/>
  
  <!-- 光驱指示灯 -->
  <circle cx="260" cy="91" r="3" fill="#00cc00" opacity="0.8"/>
  
  <!-- 重置按钮 -->
  <circle cx="200" cy="115" r="8" fill="#444"/>
  <circle cx="200" cy="115" r="5" fill="#333"/>
  <text x="200" y="130" text-anchor="middle" fill="#888" font-size="5">RESET</text>
  
  <!-- 同步按钮 -->
  <circle cx="200" cy="150" r="6" fill="#444"/>
  <circle cx="200" cy="150" r="4" fill="#333"/>
  <text x="200" y="162" text-anchor="middle" fill="#888" font-size="4">SYNC</text>
  
  <!-- SD卡槽 -->
  <rect x="170" y="175" width="60" height="20" rx="3" fill="#e0e0e0"/>
  <rect x="180" y="180" width="40" height="10" rx="1" fill="#333"/>
  <text x="200" y="205" text-anchor="middle" fill="#888" font-size="5">SD CARD</text>
  
  <!-- Wii LOGO -->
  <text x="200" y="235" text-anchor="middle" fill="#0096d6" font-size="24" font-weight="bold" font-family="Arial, sans-serif">Wii</text>
  
  <!-- 底部电源指示灯 -->
  <circle cx="200" cy="255" r="4" fill="#00cc00" opacity="0.6"/>
  
  <!-- 阴影效果 -->
  <ellipse cx="200" cy="270" rx="70" ry="8" fill="rgba(0,0,0,0.12)"/>
</svg>