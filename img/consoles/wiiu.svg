<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Nintendo Wii U - 正面视图 -->
  <!-- 机身主体 - 白色底座 -->
  <rect x="90" y="140" width="220" height="100" rx="8" fill="#f5f5f5" stroke="#ddd" stroke-width="2"/>
  
  <!-- 底座顶部光驱 -->
  <rect x="110" y="160" width="120" height="10" rx="2" fill="#333"/>
  <rect x="112" y="162" width="116" height="6" rx="1" fill="#1a1a1a"/>
  
  <!-- GamePad支架区域 -->
  <rect x="120" y="100" width="160" height="45" rx="6" fill="#4a4a4a"/>
  
  <!-- GamePad屏幕 -->
  <rect x="130" y="30" width="140" height="90" rx="12" fill="#2a2a2a" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="140" y="40" width="120" height="70" rx="6" fill="#4a90d9"/>
  
  <!-- GamePad屏幕内容 -->
  <text x="200" y="75" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">Wii U</text>
  <text x="200" y="90" text-anchor="middle" fill="#fff" font-size="8">GamePad</text>
  
  <!-- 底座指示灯 -->
  <circle cx="280" cy="165" r="3" fill="#00cc00" opacity="0.8"/>
  
  <!-- 底座按钮 -->
  <circle cx="280" cy="195" r="8" fill="#444"/>
  <circle cx="280" cy="195" r="5" fill="#333"/>
  <text x="280" y="210" text-anchor="middle" fill="#888" font-size="5">SYNC</text>
  
  <!-- Wii U LOGO -->
  <text x="200" y="230" text-anchor="middle" fill="#0096d6" font-size="18" font-weight="bold" font-family="Arial, sans-serif">Wii U</text>
  
  <!-- 阴影效果 -->
  <ellipse cx="200" cy="250" rx="110" ry="8" fill="rgba(0,0,0,0.12)"/>
</svg>