<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Microsoft Xbox One - 正面视图 -->
  <!-- 机身主体 - 黑色方盒子设计 -->
  <rect x="50" y="100" width="300" height="130" rx="8" fill="#1a1a1a" stroke="#0f0f0f" stroke-width="2"/>
  
  <!-- 顶部装饰带 -->
  <rect x="50" y="100" width="300" height="25" fill="#2a2a2a"/>
  
  <!-- USB接口 -->
  <rect x="60" y="108" width="30" height="10" rx="2" fill="#333"/>
  
  <!-- 光驱槽 -->
  <rect x="180" y="150" width="150" height="50" rx="4" fill="#2a2a2a"/>
  <rect x="190" y="160" width="130" height="30" rx="3" fill="#1a1a1a"/>
  
  <!-- Xbox LOGO -->
  <circle cx="120" cy="175" r="30" fill="#2a2a2a"/>
  <text x="120" y="183" text-anchor="middle" fill="#00a651" font-size="28" font-weight="bold">X</text>
  
  <!-- 配对按钮 -->
  <circle cx="310" cy="130" r="8" fill="#333"/>
  
  <!-- XBOX ONE 标识 -->
  <text x="200" y="215" text-anchor="middle" fill="#666" font-size="8">XBOX ONE</text>
  
  <!-- 阴影效果 -->
  <ellipse cx="200" cy="245" rx="150" ry="10" fill="rgba(0,0,0,0.15)"/>
</svg>