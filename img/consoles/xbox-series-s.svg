<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Microsoft Xbox Series S - 正面视图 -->
  <!-- 机身主体 - 白色立式设计 -->
  <rect x="130" y="30" width="140" height="230" rx="10" fill="#f5f5f5" stroke="#ddd" stroke-width="2"/>
  
  <!-- 黑色通风孔区域 -->
  <rect x="140" y="40" width="120" height="100" rx="6" fill="#1a1a1a"/>
  <circle cx="200" cy="90" r="40" fill="#2a2a2a"/>
  <circle cx="200" cy="90" r="30" fill="#1a1a1a"/>
  <text x="200" y="100" text-anchor="middle" fill="#00a651" font-size="32" font-weight="bold">X</text>
  
  <!-- 控制区域 -->
  <rect x="145" y="160" width="110" height="25" rx="4" fill="#e0e0e0"/>
  
  <!-- USB接口 -->
  <rect x="165" y="165" width="25" height="10" rx="2" fill="#333"/>
  <rect x="210" y="165" width="25" height="10" rx="2" fill="#333"/>
  <text x="200" y="183" text-anchor="middle" fill="#999" font-size="5">USB</text>
  
  <!-- 配对按钮 -->
  <circle cx="200" cy="200" r="8" fill="#ddd"/>
  
  <!-- 底部通风孔 -->
  <g>
    <line x1="145" y1="220" x2="255" y2="220" stroke="#ddd" stroke-width="1"/>
    <line x1="145" y1="225" x2="255" y2="225" stroke="#ddd" stroke-width="1"/>
    <line x1="145" y1="230" x2="255" y2="230" stroke="#ddd" stroke-width="1"/>
  </g>
  
  <!-- XBOX SERIES S LOGO -->
  <text x="200" y="270" text-anchor="middle" fill="#888" font-size="7">XBOX SERIES S</text>
  
  <!-- 阴影效果 -->
  <ellipse cx="200" cy="280" rx="70" ry="10" fill="rgba(0,0,0,0.1)"/>
</svg>