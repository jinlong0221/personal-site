<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Microsoft Xbox - 正面视图 -->
  <!-- 机身主体 - 黑色 -->
  <rect x="70" y="60" width="260" height="180" rx="12" fill="#1a1a1a" stroke="#0f0f0f" stroke-width="2"/>
  
  <!-- Xbox Logo 圆形 -->
  <circle cx="200" cy="130" r="60" fill="#333"/>
  <circle cx="200" cy="130" r="50" fill="#1a1a1a"/>
  <text x="200" y="140" text-anchor="middle" fill="#00a651" font-size="36" font-weight="bold">X</text>
  
  <!-- 光驱槽 -->
  <rect x="90" y="200" width="220" height="20" rx="4" fill="#333"/>
  <rect x="100" y="205" width="200" height="10" rx="2" fill="#222"/>
  
  <!-- 电源按钮 -->
  <circle cx="310" cy="80" r="10" fill="#333"/>
  <circle cx="310" cy="80" r="6" fill="#00a651" opacity="0.8"/>
  
  <!-- Xbox LOGO -->
  <text x="200" y="250" text-anchor="middle" fill="#00a651" font-size="16" font-weight="bold">XBOX</text>
  
  <!-- 阴影效果 -->
  <ellipse cx="200" cy="265" rx="130" ry="10" fill="rgba(0,0,0,0.15)"/>
</svg>