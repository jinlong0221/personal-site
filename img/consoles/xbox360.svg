<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Microsoft Xbox 360 - 正面视图 -->
  <!-- 机身主体 - 白色 -->
  <path d="M140 30 L260 30 L300 50 L300 250 L100 250 L100 50 Z" fill="#f5f5f5" stroke="#ddd" stroke-width="2"/>
  
  <!-- 顶部凹陷区域 -->
  <path d="M140 30 L260 30 L240 50 L160 50 Z" fill="#6b6b6b"/>
  
  <!-- 光驱槽 -->
  <rect x="140" y="70" width="120" height="50" rx="6" fill="#e8e8e8"/>
  <rect x="150" y="80" width="100" height="30" rx="4" fill="#333"/>
  <text x="200" y="100" text-anchor="middle" fill="#666" font-size="8">DVD</text>
  
  <!-- 电源按钮（Xbox标志） -->
  <circle cx="200" cy="150" r="25" fill="#e0e0e0" stroke="#ccc" stroke-width="1"/>
  <circle cx="200" cy="150" r="18" fill="#6b6b6b"/>
  <text x="200" y="156" text-anchor="middle" fill="#00a651" font-size="18" font-weight="bold">X</text>
  
  <!-- 手柄接口 -->
  <rect x="150" y="190" width="100" height="30" rx="4" fill="#e8e8e8"/>
  <rect x="165" y="198" width="30" height="14" rx="2" fill="#6b6b6b"/>
  <rect x="205" y="198" width="30" height="14" rx="2" fill="#6b6b6b"/>
  
  <!-- Xbox 360 LOGO -->
  <text x="200" y="240" text-anchor="middle" fill="#888" font-size="10" font-weight="bold">XBOX 360</text>
  
  <!-- 阴影效果 -->
  <ellipse cx="200" cy="265" rx="100" ry="10" fill="rgba(0,0,0,0.1)"/>
</svg>