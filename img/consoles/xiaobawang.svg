<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- 小霸王学习机 - 正面视图 -->
  <!-- 机身主体 - 白色键盘+主机组合 -->
  <rect x="60" y="80" width="280" height="170" rx="10" fill="#f5f5f5" stroke="#ddd" stroke-width="2"/>
  
  <!-- 键盘区域 -->
  <rect x="70" y="100" width="260" height="70" rx="6" fill="#e8e8e8"/>
  
  <!-- 键盘按键 -->
  <g fill="#ddd" stroke="#ccc" stroke-width="0.5">
    <rect x="80" y="110" width="15" height="10" rx="1"/>
    <rect x="98" y="110" width="15" height="10" rx="1"/>
    <rect x="116" y="110" width="15" height="10" rx="1"/>
    <rect x="134" y="110" width="15" height="10" rx="1"/>
    <rect x="152" y="110" width="15" height="10" rx="1"/>
    <rect x="170" y="110" width="15" height="10" rx="1"/>
    <rect x="188" y="110" width="15" height="10" rx="1"/>
    <rect x="206" y="110" width="15" height="10" rx="1"/>
    <rect x="224" y="110" width="15" height="10" rx="1"/>
    <rect x="242" y="110" width="15" height="10" rx="1"/>
    <rect x="260" y="110" width="15" height="10" rx="1"/>
    <rect x="278" y="110" width="15" height="10" rx="1"/>
    <rect x="296" y="110" width="20" height="10" rx="1"/>
    
    <rect x="80" y="122" width="15" height="10" rx="1"/>
    <rect x="98" y="122" width="15" height="10" rx="1"/>
    <rect x="116" y="122" width="15" height="10" rx="1"/>
    <rect x="134" y="122" width="15" height="10" rx="1"/>
    <rect x="152" y="122" width="15" height="10" rx="1"/>
    <rect x="170" y="122" width="15" height="10" rx="1"/>
    <rect x="188" y="122" width="15" height="10" rx="1"/>
    <rect x="206" y="122" width="15" height="10" rx="1"/>
    <rect x="224" y="122" width="15" height="10" rx="1"/>
    <rect x="242" y="122" width="15" height="10" rx="1"/>
    <rect x="260" y="122" width="15" height="10" rx="1"/>
    <rect x="278" y="122" width="38" height="10" rx="1"/>
  </g>
  
  <!-- 卡带槽 -->
  <rect x="280" y="180" width="50" height="50" rx="4" fill="#ddd"/>
  <rect x="285" y="185" width="40" height="40" rx="2" fill="#ccc"/>
  
  <!-- 手柄接口 -->
  <rect x="70" y="180" width="100" height="50" rx="4" fill="#e8e8e8"/>
  <circle cx="95" cy="205" r="15" fill="#ccc"/>
  <circle cx="145" cy="205" r="15" fill="#ccc"/>
  
  <!-- 小霸王 LOGO -->
  <text x="200" y="95" text-anchor="middle" fill="#e60012" font-size="14" font-weight="bold">小霸王</text>
  <text x="200" y="245" text-anchor="middle" fill="#666" font-size="10">学习机</text>
  
  <!-- 阴影效果 -->
  <ellipse cx="200" cy="265" rx="140" ry="10" fill="rgba(0,0,0,0.1)"/>
</svg>