<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>金龙的 AI 学习站</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --text: #1d1d1f; --text-secondary: #86868b; --bg: #fbfbfd; --card: #ffffff; --border: #d2d2d7; --accent: #0071e3; --radius: 20px; }
body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; -webkit-font-smoothing: antialiased; }
.container { max-width: 900px; margin: 0 auto; padding: 0 20px; }
header { padding: 50px 0 30px; text-align: center; }
header h1 { font-size: 48px; font-weight: 700; background: linear-gradient(135deg, #1d1d1f 0%, #0071e3 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
header p { font-size: 18px; color: var(--text-secondary); }
/* 天气卡片 - 最顶部 */
.weather-panel { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 24px; padding: 32px; margin: 20px 0 40px; color: white; box-shadow: 0 12px 60px rgba(102,126,234,0.3); }
.weather-panel h2 { font-size: 16px; font-weight: 500; opacity: 0.9; margin-bottom: 8px; }
.weather-main { display: flex; align-items: center; gap: 24px; margin-bottom: 20px; }
.weather-temp { font-size: 56px; font-weight: 700; line-height: 1; }
.weather-info { font-size: 18px; opacity: 0.95; }
.weather-info span { display: block; margin-bottom: 4px; }
.weather-suggest { background: rgba(255,255,255,0.2); border-radius: 12px; padding: 14px 18px; font-size: 15px; }
/* 学习专题 */
.panel { background: var(--card); border-radius: var(--radius); padding: 32px; margin: 20px 0; box-shadow: 0 4px 40px rgba(0,0,0,0.04); border: 1px solid rgba(210,210,215,0.4); }
.panel h2 { font-size: 22px; font-weight: 700; margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 16px; }
.card { background: #f5f5f7; border-radius: 16px; overflow: hidden; text-decoration: none; color: inherit; transition: transform 0.2s, box-shadow 0.2s; display: block; }
.card:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.1); }
.card-img { width: 100%; height: 150px; object-fit: cover; }
.card-body { padding: 18px 20px 20px; }
.card .tag { display: inline-block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--accent); margin-bottom: 8px; }
.card h3 { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
.card p { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
footer { text-align: center; padding: 60px 0 50px; color: var(--text-secondary); font-size: 13px; }
@media (max-width: 768px) {
header h1 { font-size: 34px; }
.weather-temp { font-size: 42px; }
}
</style>
</head>
<body>
<div class="container">
<header>
<h1>金龙的 AI 学习站</h1>
<p>每天学一点，积累成专家</p>
</header>

<!-- 射阳天气 - 最顶部 -->
<div class="weather-panel">
<h2>📍 射阳天气 · 06月21日 19:45</h2>
<div class="weather-main">
<div class="weather-temp">23.2°</div>
<div class="weather-info">
<span>阴</span>
<span>湿度 93% · 东北风 10.4km/h</span>
</div>
</div>
<div class="weather-suggest">👔 凉爽，适宜出行；湿度极高，闷热感强</div>
</div>

<!-- 学习专题 -->
<div class="panel">
<h2>📖 学习专题</h2>
<div class="card-grid">
<a class="card" href="agarwood.html">
<img class="card-img" src="https://images.unsplash.com/photo-1606041008023-472dfb5e530f?w=600&q=75" alt="沉香">
<div class="card-body">
<div class="tag">鉴别专题</div>
<h3>沉香鉴别</h3>
<p>沉水法、闻香法、纹理结构、产地特征、常见造假手段。</p>
</div>
</a>
<a class="card" href="herbs.html">
<img class="card-img" src="https://images.unsplash.com/photo-1471193945509-9ad0617afabf?w=600&q=75" alt="中药材">
<div class="card-body">
<div class="tag">中药材</div>
<h3>中药材与名贵香料</h3>
<p>沉香、猫屎咖啡、熊胆、五灵脂等10种物料全面解析。</p>
</div>
</a>
<a class="card" href="bracelet.html">
<img class="card-img" src="https://images.unsplash.com/photo-1573408301185-9146fe634ad0?w=600&q=75" alt="手串">
<div class="card-body">
<div class="tag">文玩手串</div>
<h3>星月菩提 · 凤眼 · 龙眼</h3>
<p>盘玩方法、品牌溢价、鉴别技巧、DIY手串入门。</p>
</div>
</a>
<a class="card" href="tesla.html">
<img class="card-img" src="https://images.unsplash.com/photo-1617788138017-80ad40651399?w=600&q=75" alt="特斯拉">
<div class="card-body">
<div class="tag">每日新闻</div>
<h3>特斯拉新闻</h3>
<p>每天9点自动推送全球及中国特斯拉资讯。</p>
</div>
</a>
</div>
</div>

<footer>
<p>由 <span style="color:var(--accent);font-weight:500">QClaw AI</span> 驱动</p>
</footer>
</div>
</body>
</html>
