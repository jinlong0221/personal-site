<style>
  /* 卡片网格布局（兼容 index.html） */
  .card-grid {
    display: grid;
    gap: 24px;
    margin-bottom: 32px;
  }
  .card-grid-1 { grid-template-columns: 1fr; }
  .card-grid-2 { grid-template-columns: repeat(2, 1fr); }
  .card-grid-3 { grid-template-columns: repeat(3, 1fr); }

  /* 首屏大卡片（AI学习3卡片等宽） */
  .card-grid-3 .tile {
    min-height: 180px;
  }

  /* 移动端：768px 2列 */
  @media (max-width: 768px) {
    .card-grid-3 { grid-template-columns: repeat(2, 1fr); }
    .card-grid-2 { grid-template-columns: 1fr; }
    .tile-2x1 { grid-column: span 1; }
  }

  /* 移动端：480px 1列 */
  @media (max-width: 480px) {
    .card-grid-3,
    .card-grid-2,
    .card-grid-1 { grid-template-columns: 1fr; }
  }

  /* 小卡片（射阳天气） */
  .card-small { min-height: 120px; }

  /* 深浅模式下图标颜色同步 */
  [data-theme="light"] .icon-sun { display: none; }
  [data-theme="light"] .icon-moon { display: block; }

  /* 首页搜索入口 */
  .home-search-section {
    max-width: 600px;
    margin: 24px auto 32px;
    padding: 0 16px;
  }

  .home-search-box {
    display: flex;
    gap: 8px;
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 6px;
    box-shadow: var(--shadow-md);
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .home-search-box:focus-within {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.15);
  }

  .home-search-input {
    flex: 1;
    padding: 12px 16px;
    font-size: 1rem;
    font-family: inherit;
    background: transparent;
    border: none;
    color: var(--text);
    outline: none;
  }

  .home-search-input::placeholder {
    color: var(--text-muted);
  }

  .home-search-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 12px 24px;
    font-size: 1rem;
    font-family: inherit;
    background: var(--gold);
    color: #0a0a0a;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    transition: background 0.2s, transform 0.15s;
    white-space: nowrap;
  }

  .home-search-btn:hover {
    background: var(--gold-light);
    transform: translateY(-1px);
  }

  .home-search-btn:active {
    transform: translateY(0);
  }

  [data-theme="light"] .home-search-btn {
    color: #ffffff;
  }

  /* 移动端适配 */
  @media (max-width: 480px) {
    .home-search-section {
      margin: 16px auto 24px;
    }

    .home-search-box {
      flex-direction: column;
      padding: 8px;
    }

    .home-search-input {
      padding: 10px 12px;
    }

    .home-search-btn {
      justify-content: center;
      padding: 10px 16px;
    }
  }
</style>
<script>
  // 确保 #tb 按钮也能触发主题切换（兼容现有 app.js 的 #themeToggle 查找）
  document.addEventListener('DOMContentLoaded', function() {
    var btn = document.getElementById('tb');
    if (btn) {
      btn.addEventListener('click', function() {
        var cur = document.documentElement.getAttribute('data-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', cur === 'dark' ? 'light' : 'dark');
      });
    }
    // 同步深浅图标显示
    function syncThemeIcon() {
      var theme = document.documentElement.getAttribute('data-theme') || 'dark';
      var sun = document.querySelector('.icon-sun');
      var moon = document.querySelector('.icon-moon');
      if (sun && moon) {
        sun.style.display = theme === 'dark' ? 'block' : 'none';
        moon.style.display = theme === 'dark' ? 'none' : 'block';
      }
    }
    syncThemeIcon();
    if (typeof MutationObserver !== 'undefined') {
      new MutationObserver(syncThemeIcon).observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
    }
  });
</script>
