<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --text: #ffffff;
  --text-secondary: #b0b0b0;
  --text-muted: #7a7a7a;
  --card: #1a1a1a;
  --border: #333;
  --nav-bg: rgba(10,10,10,0.95);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans SC', 'Segoe UI', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  transition: background 0.3s, color 0.3s;
}

/* Metro Header */
header {
  padding: 40px 20px 20px;
  max-width: 1200px;
  margin: 0 auto;
}
.site-title {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: 48px;
  font-weight: 400;
  color: var(--text);
  letter-spacing: 4px;
}
.subtitle {
  font-size: 14px;
  color: var(--text-secondary);
  margin-top: 8px;
  letter-spacing: 0.5px;
}

/* Metro Grid */
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px 40px;
}

.section-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin: 30px 0 15px;
  padding-left: 5px;
}

.tile-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 4px;
}

/* Base Tile */
.tile {
  background: var(--card);
  padding: 20px;
  min-height: 120px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  cursor: pointer;
  transition: transform 0.15s, filter 0.15s, background 0.3s, box-shadow 0.3s;
  text-decoration: none;
  color: var(--text);
}
.tile:hover {
  transform: scale(1.02);
  filter: brightness(1.1);
}

.tile-1x1 { grid-column: span 1; grid-row: span 1; }
.tile-2x1 { grid-column: span 2; grid-row: span 1; }
.tile-1x2 { grid-column: span 1; grid-row: span 2; }
.tile-2x2 { grid-column: span 2; grid-row: span 2; }

/* Tile Colors */
.tile-blue, .tile-green, .tile-orange, .tile-red, .tile-purple, .tile-teal, .tile-pink, .tile-yellow {
  background: var(--card);
  border-left: 4px solid #0078d4;
  border-top: 1px solid var(--border);
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.tile-green { border-left-color: #107c10; }
.tile-orange { border-left-color: #ff8c00; }
.tile-red { border-left-color: #e81123; }
.tile-purple { border-left-color: #6b69d6; }
.tile-teal { border-left-color: #008272; }
.tile-pink { border-left-color: #c30052; }
.tile-yellow { border-left-color: #ffb900; }
.tile-dark { background: var(--card); border: 1px solid var(--border); }

.tile .emoji { font-size: 36px; line-height: 1; margin-bottom: 10px; }
.tile .title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
.tile .desc { font-size: 13px; opacity: 0.8; line-height: 1.4; }
.tile .meta { font-size: 11px; opacity: 0.6; margin-top: auto; }
.tile .big-number { font-size: 52px; font-weight: 100; line-height: 1; }
.tile .unit { font-size: 24px; font-weight: 400; opacity: 0.7; }

.weather-info { display: flex; align-items: baseline; gap: 8px; }
.weather-detail { display: flex; gap: 20px; margin-top: 15px; font-size: 13px; opacity: 0.8; }

footer {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-muted);
  font-size: 12px;
}

/* ===== Light Theme Overrides ===== */




/* Theme Toggle Button */
.theme-toggle {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 9999;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  font-size: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 16px rgba(0,0,0,0.3);
  transition: transform 0.2s, background 0.3s;
  background: #333;
  color: #fff;
}



/* Responsive */
@media (max-width: 900px) {
  .tile-grid { grid-template-columns: repeat(3, 1fr); }
  .tile-2x2 { grid-column: span 2; }
}
@media (max-width: 600px) {
  .tile-grid { grid-template-columns: repeat(2, 1fr); }
  .tile-2x1, .tile-2x2 { grid-column: span 2; }
  .site-title { font-size: 36px; }
}

<script>
async function loadHomeWeather() {
  try {
    const url = 'https://api.open-meteo.com/v1/forecast?latitude=33.77&longitude=120.26&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m,wind_direction_10m&timezone=Asia/Shanghai';
    const resp = await fetch(url);
    const data = await resp.json();
    const c = data.current;
    const WMO = {0:"晴",1:"晴",2:"多云",3:"阴",45:"雾",48:"雾凇",51:"小毛毛雨",53:"中毛毛雨",55:"大毛毛雨",61:"小雨",63:"中雨",65:"大雨",71:"小雪",73:"中雪",75:"大雪",80:"小阵雨",81:"中阵雨",82:"大阵雨",95:"雷暴"};
    const WIND = ["北风","东北风","东风","东南风","南风","西南风","西风","西北风"];
    document.getElementById('home-temp').textContent = c.temperature_2m + '°';
    document.getElementById('home-desc').textContent = WMO[c.weather_code] || '未知';
    document.getElementById('home-hum').textContent = '湿度 ' + c.relative_humidity_2m + '%';
    document.getElementById('home-wind').textContent = WIND[Math.round(c.wind_direction_10m/45)%8] + ' ' + c.wind_speed_10m.toFixed(0) + 'km/h';
    const t = c.temperature_2m, h = c.relative_humidity_2m;
    let feel = t >= 30 ? '闷热' : t >= 25 ? '偏热' : t >= 18 ? '舒适' : t >= 10 ? '微凉' : '寒冷';
    if (h >= 85 && t >= 25) feel = '闷热';
    document.getElementById('home-feel').textContent = feel;
    const now = new Date();
    document.getElementById('home-time').textContent = '更新于 ' + now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0');
  } catch(e) {}
}
loadHomeWeather();
setInterval(loadHomeWeather, 10*60*1000);
</script>









<button class="theme-toggle" id="tb">🌙</button>
<script>
(function(){
  function getTheme(){var h=new Date().getHours();return h>=6&&h<18?'light':'dark';}
  function apply(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem('theme',t);}
  var saved=localStorage.getItem('theme');
  if(saved){apply(saved);}else{apply(getTheme());}
  var btn=document.getElementById('tb');
  if(!btn){console.error('theme btn not found');return;}
  btn.addEventListener('click',function(){
    var cur=document.documentElement.getAttribute('data-theme');
    apply(cur==='dark'?'light':'dark');
  });
  function updateIcon(){btn.textContent=document.documentElement.getAttribute('data-theme')==='dark'?'☀️':'🌙';}
  updateIcon();
  new MutationObserver(updateIcon).observe(document.documentElement,{attributes:true,attributeFilter:['data-theme']});
})();
</script>
