<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ if .Title }}{{ .Title }} - 龙兄知识库{{ else }}龙兄知识库{{ end }}</title>
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
<meta name="keywords" content="{{ with .Keywords }}{{ . }}{{ else }}{{ .Site.Params.keywords }}{{ end }}">
<link rel="canonical" href="{{ .Permalink }}">
<link rel="icon" type="image/svg+xml" href="{{ .Site.BaseURL }}favicon.svg">

<!-- Open Graph -->
<meta property="og:title" content="{{ if .Title }}{{ .Title }} - 龙兄知识库{{ else }}龙兄知识库{{ end }}">
<meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
<meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:image" content="{{ .Site.BaseURL }}img/og-image.png">
<meta property="og:locale" content="zh_CN">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ if .Title }}{{ .Title }} - 龙兄知识库{{ else }}龙兄知识库{{ end }}">
<meta name="twitter:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
<meta name="twitter:image" content="{{ .Site.BaseURL }}img/og-image.png">

<!-- Structured Data -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "WebSite",
      "name": "龙兄知识库",
      "url": "{{ .Site.BaseURL }}",
      "description": "{{ .Site.Params.description }}",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "{{ .Site.BaseURL }}search.html?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }{{ if .IsPage }},
    {
      "@type": "Article",
      "headline": "{{ .Title }}",
      "description": "{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}",
      "url": "{{ .Permalink }}",
      {{- with .Date }}"datePublished": "{{ .Format "2006-01-02" }}",{{ end }}
      {{- with .Lastmod }}"dateModified": "{{ .Format "2006-01-02" }}",{{ end }}
      "author": { "@type": "Person", "name": "{{ .Site.Params.author }}" },
      "publisher": { "@type": "Organization", "name": "龙兄知识库" }
    },
    {
      "@type": "BreadcrumbList",
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "首页", "item": "{{ .Site.BaseURL }}" },
        { "@type": "ListItem", "position": 2, "name": "{{ .Title }}", "item": "{{ .Permalink }}" }
      ]
    }
    {{ end }}
  ]
}
</script>

<!-- [主题防闪白] DOM渲染前读取localStorage设置data-theme -->
<script>(function(){try{var t=localStorage.getItem('theme');if(t==='light'||t==='dark'){document.documentElement.setAttribute('data-theme',t)}else{var h=new Date().getHours();document.documentElement.setAttribute('data-theme',(h>=6&&h<18)?'light':'dark'}}catch(e){}})();</script>

<!-- 关键CSS内联（首屏渲染不再阻塞） -->
<style id="critical-css">/* CRITICAL CSS - Above the fold */
:root{--bg:#0f0f0f;--bg-secondary:#1a1a1a;--card:#1a1a1a;--card-hover:#222;--border:#2a2a2a;--border-light:#333;--text:#e0e0e0;--text-secondary:#a0a0a0;--text-muted:#707070;--gold:#c9a84c;--gold-light:#e0c97a;--blue-light:#4da6e8;--orange:#ff8c00;--nav-bg:rgba(10,10,10,.96);--shadow-sm:0 1px 3px rgba(0,0,0,.3);--shadow-md:0 4px 12px rgba(0,0,0,.4);--radius:8px;--radius-sm:4px;--max-width:1200px;--nav-height:56px;--transition:.25s ease;--bubble-bg:#3d2e1e;--bubble-text:#eee;--border-light-new:#333;--text-muted-new:#888;--bg-section:#1a1a2e}
[data-theme="light"]{--bg:#f5f5f0;--bg-secondary:#eeeeea;--card:#fff;--card-hover:#f9f9f7;--border:#e0ddd5;--border-light:#d5d2ca;--text:#1a1a1a;--text-secondary:#444;--text-muted:#707070;--gold:#a68a3c;--gold-light:#c9a84c;--nav-bg:rgba(255,255,255,.96);--shadow-sm:0 1px 3px rgba(0,0,0,.06);--shadow-md:0 4px 12px rgba(0,0,0,.08);--bubble-bg:#FFF8F0;--bubble-text:#222;--border-light-new:#d5d2ca;--text-muted-new:#999;--bg-section:#f8f9fa}
[data-theme="dark"]{--orange:#FFB380;--card:#1e1e1e;--card-hover:#2a2a2a;--border:#3a3a3a;--text:#e0e0e0;--text-secondary:#c0c0c0;--gold:#d4af37;--gold-light:#e0c97a;--nav-bg:rgba(10,10,10,.96);--bubble-bg:#3d2e1e;--bubble-text:#eee;--bg-section:#1a1a2e}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:2px}
html{font-size:16px;overflow-x:hidden;scroll-behavior:smooth;scrollbar-gutter:stable;-webkit-overflow-scrolling:touch}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei','Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.8;min-height:100vh;-webkit-font-smoothing:antialiased;padding-top:var(--nav-height);overflow-x:hidden;transition:background var(--transition),color var(--transition);text-rendering:optimizeLegibility}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background-image:linear-gradient(rgba(201,168,76,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,.03) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;z-index:-1}
a{color:var(--blue-light);text-decoration:none;transition:color var(--transition)}
a:hover{color:var(--gold)}
img{max-width:100%;height:auto}
h1,h2,h3,h4,h5,h6{font-weight:700;line-height:1.4;color:var(--text)}
.container{max-width:var(--max-width);margin:0 auto;padding:0 20px}
.navbar{position:fixed;top:0;left:0;right:0;z-index:200;background:var(--nav-bg);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);height:var(--nav-height)}
.navbar-inner{max-width:var(--max-width);margin:0 auto;padding:0 20px;height:100%;display:flex;align-items:center;justify-content:space-between}
.navbar .logo{font-weight:900;font-size:1.4rem;color:var(--gold);text-decoration:none;white-space:nowrap;letter-spacing:1px}
.nav-links{display:flex;gap:12px;list-style:none;flex-wrap:nowrap}
.nav-links a{color:var(--text-secondary);font-size:.88rem;padding:6px 2px;white-space:nowrap;border-bottom:2px solid transparent}
.nav-links a:hover,.nav-links a.active{color:var(--gold);border-bottom-color:var(--gold)}
.nav-actions{display:flex;align-items:center;gap:4px}
.icon-btn{background:none;border:none;cursor:pointer;padding:8px;color:var(--text);display:flex;align-items:center;justify-content:center;min-width:44px;min-height:44px;border-radius:var(--radius-sm)}
.hamburger{display:none;background:none;border:none;cursor:pointer;padding:8px;min-width:44px;min-height:44px;flex-direction:column;justify-content:center;align-items:center;gap:5px}
.hamburger span{display:block;width:22px;height:2px;background:var(--text);border-radius:1px}
.mobile-nav{display:none;position:fixed;top:var(--nav-height);left:0;right:0;background:var(--nav-bg);border-bottom:1px solid var(--border);z-index:199;padding:12px 20px;flex-direction:column;gap:4px}
.mobile-nav.open{display:flex}
@keyframes tickerScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.mag-header{display:flex;align-items:center;gap:14px;padding:12px 0;margin-bottom:20px}
.mag-status-bubble{display:flex;align-items:center;gap:6px;font-size:.82rem;color:var(--text-secondary);background:var(--card);border:1px solid var(--border);padding:6px 16px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.mag-ticker-mini{flex:1;min-width:0;overflow:hidden;height:36px;position:relative;background:var(--card);border:1px solid var(--border);border-radius:8px}
.mag-ticker-inner{display:flex;align-items:center;white-space:nowrap;animation:tickerScroll 18s linear infinite;height:100%;padding-left:56px;will-change:transform}
.mag-ticker-inner a{flex:0 0 auto;padding:0 28px 0 0;font-size:.78rem;color:var(--text-secondary);text-decoration:none;height:36px;line-height:36px}
.mag-ticker-label{position:absolute;left:8px;top:6px;font-size:.68rem;font-weight:700;color:var(--gold);background:var(--bg);padding:1px 8px;border-radius:4px;z-index:2}
.mag-featured{display:grid;grid-template-columns:2fr 1fr;gap:18px;margin-bottom:28px}
.mag-feat-main{position:relative;border-radius:14px;overflow:hidden;border:1px solid var(--border);min-height:280px;display:flex;flex-direction:column;justify-content:flex-end}
.mag-feat-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
.mag-feat-overlay{position:relative;z-index:1;background:linear-gradient(to top,rgba(0,0,0,.88) 0%,rgba(0,0,0,.5) 45%,transparent 100%);padding:120px 24px 24px}
.mag-feat-tag{display:inline-block;font-size:.7rem;font-weight:700;background:var(--gold);color:#000;padding:2px 10px;border-radius:4px;margin-bottom:10px}
.mag-feat-overlay h2{font-size:1.5rem;color:#fff;margin-bottom:8px;font-weight:700;text-shadow:0 2px 8px rgba(0,0,0,.6)}
.mag-feat-overlay p{font-size:.85rem;color:rgba(255,255,255,.8);line-height:1.5}
.mag-feat-side{border:1px solid var(--border);border-radius:14px;overflow:hidden;display:flex;flex-direction:column}
.mag-feat-side-img{width:100%;height:160px;object-fit:cover;display:block}
.mag-feat-side-body{padding:16px;flex:1;display:flex;flex-direction:column;justify-content:center}
.mag-section{margin-bottom:36px}
.mag-section-title{font-size:.8rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:14px;padding-bottom:6px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.mag-section-title::before{content:'';display:inline-block;width:3px;height:14px;background:var(--gold);border-radius:2px}
.mag-grid-mixed{display:grid;grid-template-columns:1.6fr 1fr;gap:16px}
.mag-card-lg{display:flex;flex-direction:column;border:1px solid var(--border);border-radius:14px;background:var(--card);text-decoration:none;overflow:hidden;position:relative}
.mag-card-lg-img{height:180px;width:100%;border-bottom:1px solid var(--border)}
.mag-card-lg-body{padding:20px;flex:1;display:flex;flex-direction:column}
.mag-card-stack{display:flex;flex-direction:column;gap:16px}
.mag-card-h{display:flex;align-items:center;gap:14px;padding:18px 16px;border:1px solid var(--border);border-radius:12px;background:var(--card);text-decoration:none;position:relative;overflow:hidden}
.mag-card-h-accent{position:absolute;left:0;top:0;bottom:0;width:3px}
.mag-card-h-icon{flex-shrink:0;width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:10px;background:var(--bg-secondary)}
.mag-card-h-body{flex:1;min-width:0}
.mag-card-h-body h4{font-size:.88rem;font-weight:700;color:var(--text);margin-bottom:2px}
.mag-card-h-body p{font-size:.72rem;color:var(--text-secondary);line-height:1.4}
.mag-card-h-arrow{flex-shrink:0;font-size:1.1rem;color:var(--text-muted)}
.mag-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.mag-grid-h{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.mag-card{display:flex;flex-direction:column;padding:22px 20px 18px;border:1px solid var(--border);border-radius:12px;background:var(--card);text-decoration:none;position:relative;overflow:hidden}
.mag-card-accent{position:absolute;top:0;left:0;width:100%;height:3px;border-radius:12px 12px 0 0}
.mag-stat-strip{display:flex;align-items:center;justify-content:center;gap:0;padding:20px 24px;margin:8px 0 36px;background:linear-gradient(135deg,var(--card),var(--bg-secondary));border:1px solid var(--border);border-radius:14px;position:relative;overflow:hidden}
.mag-stat-item{flex:1;text-align:center;position:relative;z-index:1}
.mag-stat-num{display:block;font-size:1.6rem;font-weight:800;color:var(--gold);line-height:1.2}
.mag-stat-label{display:block;font-size:.72rem;color:var(--text-muted);margin-top:2px}
.mag-stat-divider{width:1px;height:32px;background:var(--border);flex-shrink:0}
footer{text-align:center;padding:48px 20px 32px;color:var(--text-muted);font-size:.78rem;border-top:1px solid var(--border);margin-top:48px}
.skip-link{position:absolute;top:-100px;left:0;background:var(--gold);color:#000;padding:8px 16px;z-index:9999;border-radius:0 0 4px 0;font-size:.85rem;font-weight:700}
.skip-link:focus{top:0}
@media(max-width:768px){.nav-links{display:none}.hamburger{display:flex}.container{padding:0 16px}footer{padding:24px 16px}.hero{height:50vh}.hero-content h1{font-size:1.8rem}}
