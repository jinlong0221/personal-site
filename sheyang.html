<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>射阳天气 - 金龙的 AI 学习站</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --text: #1d1d1f; --text-secondary: #86868b; --bg: #fbfbfd; --card: #ffffff; --border: #d2d2d7; --accent: #0071e3; --radius: 20px; }
body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; -webkit-font-smoothing: antialiased; }
.container { max-width: 900px; margin: 0 auto; padding: 0 20px; }
.back-link { display: inline-block; margin: 30px 0; color: var(--accent); text-decoration: none; font-size: 15px; }
header { padding: 30px 0 20px; }
header h1 { font-size: 36px; font-weight: 700; }
header p { color: var(--text-secondary); font-size: 17px; margin-top: 8px; }
.weather-hero { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 24px; padding: 40px; color: white; margin: 30px 0; box-shadow: 0 12px 60px rgba(102,126,234,0.3); }
.weather-main { display: flex; align-items: center; gap: 30px; margin-bottom: 24px; }
.weather-temp { font-size: 72px; font-weight: 700; line-height: 1; }
.weather-info { font-size: 20px; opacity: 0.95; }
.weather-suggest { background: rgba(255,255,255,0.2); border-radius: 12px; padding: 16px 20px; font-size: 16px; }
.forecast-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin: 30px 0; }
.forecast-card { background: var(--card); border-radius: 16px; padding: 24px; text-align: center; box-shadow: 0 4px 40px rgba(0,0,0,0.04); border: 1px solid rgba(210,210,215,0.4); }
.forecast-card h4 { color: var(--text-secondary); font-size: 14px; margin-bottom: 12px; }
.forecast-card p { font-size: 16px; margin: 4px 0; }
.forecast-card .temp { font-size: 24px; font-weight: 700; color: var(--text); }
.update-time { color: var(--text-secondary); font-size: 13px; margin-top: 30px; text-align: center; }
footer { text-align: center; padding: 50px 0 40px; color: var(--text-secondary); font-size: 13px; }
@media (max-width: 768px) {
.forecast-grid { grid-template-columns: 1fr; }
.weather-temp { font-size: 52px; }
}
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back-link">← 返回首页</a>
<header>
<h1>🌤️ 射阳天气</h1>
<p>每天自动更新，实时掌握家乡天气</p>
</header>

<div class="weather-hero">
<div class="weather-main">
<div class="weather-temp">23.2°</div>
<div class="weather-info">
<div style="font-size:28px;font-weight:600;margin-bottom:8px;">阴</div>
<div>湿度 93%</div>
<div>东北风 10.4 km/h</div>
</div>
</div>
<div class="weather-suggest">👔 凉爽，适宜出行；湿度极高，闷热感强</div>
</div>

<h2 style="font-size:22px;font-weight:700;margin:30px 0 16px;">未来3天预报</h2>
<div class="forecast-grid">
<div class="forecast-card"><h4>周一</h4><p>雷暴</p><p class="temp">21.1~24.9°C</p><p> 预计降水18.9mm</p></div><div class="forecast-card"><h4>周二</h4><p>阴</p><p class="temp">20.7~25.1°C</p><p></p></div><div class="forecast-card"><h4>周三</h4><p>阴</p><p class="temp">19.4~27.9°C</p><p></p></div>
</div>

<div class="update-time">数据更新于 2026-06-21 19:46</div>

<footer>
<p>由 <span style="color:var(--accent);font-weight:500">QClaw AI</span> 自动维护</p>
</footer>
</div>
</body>
</html>
