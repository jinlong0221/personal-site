<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<title>射阳天气 - 龙兄知识库</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --text: #1d1d1f; --text-secondary: #86868b; --bg: #fbfbfd; --card: #ffffff; --border: #e8e8ed; --accent: #0071e3; --radius: 20px; }
body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; -webkit-font-smoothing: antialiased; }
.container { max-width: 900px; margin: 0 auto; padding: 0 20px; }

header { padding: 40px 0 30px; border-bottom: 1px solid var(--border); }
header .eyebrow { font-size: 13px; color: var(--accent); font-weight: 600; letter-spacing: 0.06em; margin-bottom: 10px; }
header h1 { font-size: 36px; font-weight: 700; line-height: 1.1; margin-bottom: 10px; }
header p { font-size: 16px; color: var(--text-secondary); }

.content-section { padding: 24px 0; border-bottom: 1px solid var(--border); }
.content-section h2 { font-size: 26px; font-weight: 700; margin-bottom: 20px; }

.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; margin: 20px 0; }

.weather-hero { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 18px; padding: 28px; color: white; margin: 20px 0; }
.weather-hero .temp { font-size: 56px; font-weight: 700; line-height: 1; }
.weather-hero .desc { font-size: 20px; margin-top: 6px; opacity: 0.9; }
.weather-hero .details { display: flex; gap: 24px; margin-top: 16px; font-size: 15px; opacity: 0.85; flex-wrap: wrap; }
.weather-hero .update-time { font-size: 12px; opacity: 0.6; margin-top: 12px; }

.forecast-card { background: #f5f5f7; border-radius: 14px; padding: 18px; }
.forecast-card .day { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.forecast-card .detail { font-size: 14px; color: var(--text-secondary); }

.advice-box { background: rgba(0,113,227,0.08); border-radius: 14px; padding: 20px; margin: 16px 0; }
.advice-box h4 { font-size: 16px; font-weight: 600; margin-bottom: 8px; color: var(--accent); }
.advice-box p { font-size: 15px; color: var(--text); }

.tip-box { background: #d1ecf1; border-left: 4px solid var(--accent); padding: 16px 20px; border-radius: 8px; margin: 20px 0; }
.tip-box strong { color: var(--accent); }

.loading { text-align: center; padding: 40px; color: var(--text-secondary); }
.loading::after { content: ''; display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-left: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }

footer { text-align: center; padding: 50px 0 30px; color: var(--text-secondary); font-size: 12px; border-top: 1px solid var(--border); margin-top: 30px; }

@media (max-width: 768px) {
header h1 { font-size: 28px; }
.card-grid { grid-template-columns: 1fr; }
.weather-hero .temp { font-size: 44px; }
.weather-hero .details { flex-direction: column; gap: 6px; }
}
</style>
</head>
<body>
<div style="background:#fff;border-bottom:1px solid #e8e8ed;padding:12px 0;position:sticky;top:0;z-index:200;backdrop-filter:blur(10px);background:rgba(255,255,255,0.9)">
  <div style="max-width:900px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between">
    <a href="index.html" style="font-family:'Ma Shan Zheng',cursive;font-size:28px;color:#1d1d1f;text-decoration:none;letter-spacing:2px">龙兄知识库</a>
    <a href="index.html" style="color:#0071e3;font-size:14px;text-decoration:none">← 首页</a>
  </div>
</div>
<div class="container">

<header>
<div class="eyebrow">🌦️ 实时天气</div>
<h1>射阳天气</h1>
<p>每次打开自动获取最新气象数据</p>
</header>

<div class="content-section">
<div id="weather-hero" class="loading">正在获取天气数据</div>
<div id="forecast-grid" class="card-grid"></div>
<div id="advice" class="advice-box" style="display:none"></div>
<div class="tip-box"><strong>💡 说明：</strong>天气数据来自 Open-Meteo 开放气象 API，每次打开页面自动获取最新数据，每10分钟自动刷新。</div>
</div>

</div>

<script>
const LAT = 33.77, LON = 120.26;
const WMO = {0:"晴",1:"晴",2:"多云",3:"阴",45:"雾",48:"雾凇",51:"小毛毛雨",53:"中毛毛雨",55:"大毛毛雨",61:"小雨",63:"中雨",65:"大雨",71:"小雪",73:"中雪",75:"大雪",80:"小阵雨",81:"中阵雨",82:"大阵雨",95:"雷暴",96:"雷暴+冰雹",99:"雷暴+大冰雹"};
const WIND = ["北风","东北风","东风","东南风","南风","西南风","西风","西北风"];

function weatherDesc(code) { return WMO[code] || "未知"; }
function windDir(deg) { return WIND[Math.round(deg/45)%8]; }

function dressAdvice(temp, hum, code) {
  let tips = [];
  if (temp >= 35) tips.push("高温酷热，减少外出，注意防暑");
  else if (temp >= 30) tips.push("炎热，室外注意防晒补水");
  else if (temp >= 25) tips.push("较热，适合短袖");
  else if (temp >= 18) tips.push("舒适，适宜户外活动");
  else if (temp >= 10) tips.push("微凉，建议加件外套");
  else if (temp >= 0) tips.push("较冷，注意保暖");
  else tips.push("严寒，尽量减少外出");
  if (hum >= 90) tips.push("湿度极高，体感闷热，注意防潮");
  else if (hum >= 75) tips.push("湿度偏高，略闷");
  else if (hum <= 30) tips.push("空气干燥，注意保湿");
  if ([61,63,65,80,81,82,95,96,99].includes(code)) tips.push("有雨/雷暴，外出带伞");
  if ([71,73,75,85,86].includes(code)) tips.push("有雪，注意路滑");
  return tips.join("；");
}

async function loadWeather() {
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m,wind_direction_10m&daily=temperature_2m_max,temperature_2m_min,weather_code,precipitation_sum&timezone=Asia/Shanghai&forecast_days=4`;
    const resp = await fetch(url);
    const data = await resp.json();
    const c = data.current;
    const temp = c.temperature_2m, hum = c.relative_humidity_2m, code = c.weather_code;
    const ws = c.wind_speed_10m, wd = windDir(c.wind_direction_10m);
    const desc = weatherDesc(code);
    const advice = dressAdvice(temp, hum, code);
    const now = new Date();
    const ts = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

    const el = document.getElementById('weather-hero');
    el.className = 'weather-hero';
    el.innerHTML = `<div class="temp">${temp}°C</div><div class="desc">${desc}</div><div class="details"><span>💧 湿度 ${hum}%</span><span>🌬️ ${wd} ${ws.toFixed(1)} km/h</span></div><div class="update-time">更新于 ${ts}</div>`;

    if (data.daily) {
      const fg = document.getElementById('forecast-grid');
      const days = data.daily;
      const wk = ["周日","周一","周二","周三","周四","周五","周六"];
      let html = '';
      for (let i = 1; i < Math.min(4, days.time.length); i++) {
        const d = new Date(days.time[i]);
        const dn = wk[d.getDay()];
        const hi = days.temperature_2m_max[i], lo = days.temperature_2m_min[i];
        const wd2 = weatherDesc(days.weather_code[i]);
        const rain = days.precipitation_sum[i];
        const rs = rain > 0 ? ` · 降水${rain}mm` : '';
        html += `<div class="forecast-card"><div class="day">${dn}</div><div class="detail">${wd2} ${lo}~${hi}°C${rs}</div></div>`;
      }
      fg.innerHTML = html;
    }

    const adv = document.getElementById('advice');
    adv.style.display = 'block';
    adv.innerHTML = `<h4>👔 出行建议</h4><p>${advice}</p>`;
  } catch(e) {
    document.getElementById('weather-hero').innerHTML = '<p style="color:var(--text-secondary);padding:40px 0">⚠️ 天气数据获取失败，请稍后刷新</p>';
  }
}

loadWeather();
setInterval(loadWeather, 10 * 60 * 1000);
</script>

<footer>
<p>由 <span style="color:var(--accent);font-weight:500">QClaw AI</span> 整理 · 天气信息仅供参考</p>
</footer>
</body>
</html>
