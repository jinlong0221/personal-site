    <h1 class="history-title">🐉 龙兄状态历史</h1>
    <div class="history-list" id="historyList">
      <div class="empty-history">加载中...</div>
    </div>
  </div>

  <script>
    // 加载状态历史
    function loadStatusHistory() {
      var historyList = document.getElementById('historyList');
      
      // 先尝试读取 status-history.json
      var xhr = new XMLHttpRequest();
      xhr.open('GET', 'status-history.json', true);
      xhr.responseType = 'json';
      
      xhr.onload = function() {
        if (xhr.status === 200 && xhr.response && xhr.response.history) {
          renderHistory(xhr.response.history);
        } else {
          // 没有历史文件，显示当前状态
          showCurrentStatusOnly();
        }
      };
      
      xhr.onerror = function() {
        showCurrentStatusOnly();
      };
      
      xhr.send();
    }
    
    // 渲染历史记录
    function renderHistory(history) {
      var historyList = document.getElementById('historyList');
      
      if (!history || history.length === 0) {
        historyList.innerHTML = '<div class="empty-history">暂无历史记录</div>';
        return;
      }
      
      // 按时间倒序排列
      history.sort(function(a, b) {
        return new Date(b.updatedAt) - new Date(a.updatedAt);
      });
      
      var html = '';
      history.forEach(function(item) {
        var date = new Date(item.updatedAt);
        var dateStr = date.toLocaleDateString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit' });
        var timeStr = date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        
        html += '<div class="history-item">' +
          '<div class="history-meta">' +
            '<span class="history-date">' + dateStr + '</span>' +
            '<span class="history-time">' + timeStr + '</span>' +
          '</div>' +
          '<div class="history-status">' + item.status + '</div>' +
        '</div>';
      });
      
      historyList.innerHTML = html;
    }
    
    // 只显示当前状态（没有历史文件时）
    function showCurrentStatusOnly() {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', 'status.json', true);
      xhr.responseType = 'json';
      
      xhr.onload = function() {
        if (xhr.status === 200 && xhr.response) {
          renderHistory([xhr.response]);
        } else {
          document.getElementById('historyList').innerHTML = '<div class="empty-history">暂无状态记录</div>';
        }
      };
      
      xhr.send();
    }
    
    // 页面加载完成后执行
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', loadStatusHistory);
    } else {
      loadStatusHistory();
    }
  </script>
