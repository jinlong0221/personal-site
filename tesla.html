<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>特斯拉新闻 - 金龙的 AI 学习站</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --text: #1d1d1f; --text-secondary: #86868b; --bg: #fbfbfd; --card: #ffffff; --border: #d2d2d7; --accent: #0071e3; --radius: 20px; }
body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; -webkit-font-smoothing: antialiased; }
.container { max-width: 900px; margin: 0 auto; padding: 0 20px; }
.back-link { display: inline-block; margin: 30px 0; color: var(--accent); text-decoration: none; font-size: 15px; }
.back-link:hover { text-decoration: underline; }
header { padding: 40px 0 50px; }
header h1 { font-size: 42px; font-weight: 700; line-height: 1.2; margin-bottom: 16px; }
header p { font-size: 19px; color: var(--text-secondary); max-width: 700px; }
.content-section { background: var(--card); border-radius: var(--radius); padding: 40px; margin: 20px 0; box-shadow: 0 4px 40px rgba(0,0,0,0.04); border: 1px solid rgba(210,210,215,0.4); }
.content-section h2 { font-size: 26px; font-weight: 700; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
.content-section p { font-size: 16px; margin-bottom: 16px; }
.tip-box { background: #d1ecf1; border-left: 4px solid var(--accent); padding: 16px 20px; border-radius: 8px; margin: 20px 0; }
.info-card { background: #f5f5f7; border-radius: 14px; padding: 22px; margin: 16px 0; }
.info-card h4 { font-size: 16px; font-weight: 600; margin-bottom: 10px; }
footer { text-align: center; padding: 60px 0 40px; color: var(--text-secondary); font-size: 13px; }
</style>
</head>
<body>
<div class="container">
<a href="index.html" class="back-link">← 返回首页</a>
<header>
<h1>🚗 特斯拉新闻</h1>
<p>每日自动更新全球及中国特斯拉资讯。</p>
</header>

<img src="https://images.unsplash.com/photo-1617788138017-80ad40651399?w=1200&q=80" alt="特斯拉" style="width:100%;max-width:860px;height:280px;object-fit:cover;border-radius:24px;margin:20px auto;display:block;box-shadow:0 8px 60px rgba(0,0,0,0.1);">

<div class="content-section">
<h2>📡 新闻自动推送</h2>
<div class="info-card">
<h4>推送时间</h4>
<p>每天早上 9:00 自动推送特斯拉新闻到微信</p>
</div>
<div class="info-card">
<h4>新闻来源</h4>
<p>多源交叉验证：特斯拉官方、财经媒体、汽车媒体、社交媒体</p>
</div>
<div class="info-card">
<h4>覆盖车型</h4>
<p>Model 3 · Model Y · Model S · Model X · Cybertruck</p>
</div>
<div class="info-card">
<h4>内容类型</h4>
<p>全球销量数据 · 中国市场动态 · 新车发布 · 技术更新 · 价格调整 · 充电网络扩张</p>
</div>
</div>

<div class="tip-box">
<strong>💡 说明：</strong>新闻数据由 AI 每日自动抓取并推送，确保信息及时准确。
</div>

<footer>
<p>由 <span style="color:var(--accent);font-weight:500">QClaw AI</span> 自动维护</p>
</footer>
</div>
</body>
</html>
