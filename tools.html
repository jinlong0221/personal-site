  /* 工具页样式 */
  .tools-header {
    padding: 32px 0 16px;

    line-height: 1.6;

  /* 工具卡片 */
  .tool-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    max-width: 600px;
    margin: 32px auto;
    box-shadow: var(--shadow-sm);
    transition: transform 0.3s ease, box-shadow 0.3s ease, background var(--transition);
    border-top: 4px solid var(--orange);
  }

  .tool-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-lg);
  }

  .tool-card h2 {
    font-size: 1.3rem;
    color: var(--orange);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .tool-card h2 .icon {
    font-size: 1.5rem;
  }

  .tool-card p {
    font-size: 0.9rem;
    color: var(--text-secondary);
    margin-bottom: 16px;
  }

  /* 表单样式 */
  .tool-form {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .form-group label {
    font-size: 0.85rem;
    color: var(--text-secondary);
    font-weight: 500;
  }

  .form-group input,
  .form-group select {
    padding: 10px 12px;
    font-size: 0.95rem;
    font-family: inherit;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    outline: none;
    transition: border-color var(--transition), box-shadow var(--transition);
    min-height: 44px;
  }

  .form-group input:focus,
  .form-group select:focus {
    border-color: var(--orange);
    box-shadow: 0 0 0 3px rgba(230, 126, 34, 0.15);
  }

  .form-group input.error {
    border-color: var(--red);
  }

  .form-group .error-msg {
    font-size: 0.8rem;
    color: var(--red);
    display: none;
  }

  .form-group input.error + .error-msg {
    display: block;
  }

  /* 按钮样式 */
  .btn-calc {
    padding: 12px 24px;
    font-size: 1rem;
    font-family: inherit;
    font-weight: 700;
    background: var(--orange);
    color: #ffffff;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background var(--transition), transform 0.2s;
    min-height: 44px;
    margin-top: 8px;
  }

  .btn-calc:hover {
    background: #d35400;
    transform: translateY(-2px);
  }

  .btn-calc:active {
    transform: translateY(0);
  }

  /* 结果展示区 */
  .result-box {
    margin-top: 16px;
    padding: 16px;
    background: rgba(230, 126, 34, 0.06);
    border-left: 4px solid var(--orange);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    display: none;
  }

  .result-box.show {
    display: block;
  }

  .result-box h3 {
    font-size: 1rem;
    color: var(--orange);
    margin-bottom: 8px;
  }

  .result-box p {
    font-size: 0.95rem;
    color: var(--text);
    margin-bottom: 4px;
  }

  .result-box .highlight {
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--orange);
  }

  /* 响应式 */
  @media (max-width: 480px) {
    .tool-card {
      padding: 16px;
      margin: 24px 16px;
    }

    .tools-header {
      padding: 24px 0 12px;
    }

    .tools-header h1 {
      font-size: 1.6rem;
    }
  }
</style>

    <span class="sep">›</span>
    <span class="current">工具箱</span>
  </div>

  <!-- 页面标题 -->
  <div class="tools-header">
    <h1>🔧 龙兄工具箱</h1>
    <p class="subtitle">实用小工具，助你更懂文玩、药材、出行</p>
  </div>

  <!-- 单位换算器 -->
  <div class="tool-card">
    <h2><span class="icon">🔄</span> 单位换算器</h2>
    <p>支持长度、重量、温度单位的快速换算。</p>

    <form class="tool-form" id="convertForm">
      <div class="form-group">
        <label for="convertType">换算类型</label>
        <select id="convertType">
          <option value="length">长度：寸 ↔ cm</option>
          <option value="weight">重量：两 ↔ g</option>
          <option value="temp">温度：℃ ↔ ℉</option>
        </select>
      </div>

      <div class="form-group">
        <label for="convertValue">输入数值</label>
        <input type="number" id="convertValue" placeholder="例如：10" step="any" required>
        <span class="error-msg">请输入有效数值</span>
      </div>

      <div class="form-group">
        <label for="convertDirection">换算方向</label>
        <select id="convertDirection">
          <option value="forward">转换为目标单位</option>
          <option value="backward">反向换算</option>
        </select>
      </div>

      <button type="submit" class="btn-calc">开始换算</button>
    </form>

    <div class="result-box" id="convertResult">
      <h3>换算结果</h3>
      <p id="convertOutput">-</p>
    </div>
  </div>

<!-- ========== 工具交互脚本 ========== -->
<script>
(function() {
  'use strict';

  // 单位换算器
  var convertForm = document.getElementById('convertForm');
  var convertResult = document.getElementById('convertResult');

  if (convertForm) {
    convertForm.addEventListener('submit', function(e) {
      e.preventDefault();

      var type = document.getElementById('convertType').value;
      var valueInput = document.getElementById('convertValue');
      var direction = document.getElementById('convertDirection').value;

      var value = parseFloat(valueInput.value);

      if (isNaN(value)) {
        valueInput.classList.add('error');
        return;
      } else {
        valueInput.classList.remove('error');
      }

      var output = '';

      switch (type) {
        case 'length':
          // 寸 ↔ cm: 1 寸 = 3.333 cm
          if (direction === 'forward') {
            var cm = value * 3.333;
            output = value + ' 寸 = ' + cm.toFixed(2) + ' cm';
          } else {
            var cun = value / 3.333;
            output = value + ' cm = ' + cun.toFixed(2) + ' 寸';
          }
          break;

        case 'weight':
          // 两 ↔ g: 1 两 = 50 g
          if (direction === 'forward') {
            var g = value * 50;
            output = value + ' 两 = ' + g.toFixed(0) + ' g';
          } else {
            var liang = value / 50;
            output = value + ' g = ' + liang.toFixed(2) + ' 两';
          }
          break;

        case 'temp':
          // ℃ ↔ ℉: ℉ = ℃ × 9/5 + 32
          if (direction === 'forward') {
            var f = value * 9 / 5 + 32;
            output = value + ' ℃ = ' + f.toFixed(1) + ' ℉';
          } else {
            var c = (value - 32) * 5 / 9;
            output = value + ' ℉ = ' + c.toFixed(1) + ' ℃';
          }
          break;
      }

      document.getElementById('convertOutput').textContent = output;
      convertResult.classList.add('show');
    });

    // 根据换算类型更新方向选项
    var convertType = document.getElementById('convertType');
    var convertDirection = document.getElementById('convertDirection');

    if (convertType && convertDirection) {
      convertType.addEventListener('change', function() {
        var type = this.value;
        switch (type) {
          case 'length':
            convertDirection.options[0].text = '寸 → cm';
            convertDirection.options[1].text = 'cm → 寸';
            break;
          case 'weight':
            convertDirection.options[0].text = '两 → g';
            convertDirection.options[1].text = 'g → 两';
            break;
          case 'temp':
            convertDirection.options[0].text = '℃ → ℉';
            convertDirection.options[1].text = '℉ → ℃';
            break;
        }
      });

      // 触发一次以初始化
      convertType.dispatchEvent(new Event('change'));
    }

    // 实时清除错误状态
    var convertValueInput = document.getElementById('convertValue');
    if (convertValueInput) {
      convertValueInput.addEventListener('input', function() {
        this.classList.remove('error');
      });
    }
  }

})();
</script>
