<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旅行与签证 - 金龙的 AI 学习站</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --text: #1d1d1f; --text-secondary: #86868b; --bg: #fbfbfd; --card: #ffffff; --border: #d2d2d7; --accent: #0071e3; --radius: 20px; }
body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; -webkit-font-smoothing: antialiased; }
.container { max-width: 900px; margin: 0 auto; padding: 0 20px; }
.back-link { display: inline-block; margin: 30px 0; color: var(--accent); text-decoration: none; font-size: 15px; }
.back-link:hover { text-decoration: underline; }
header { padding: 40px 0 50px; }
header .emoji { font-size: 48px; margin-bottom: 20px; }
header h1 { font-size: 42px; font-weight: 700; line-height: 1.2; margin-bottom: 16px; }
header p { font-size: 19px; color: var(--text-secondary); max-width: 700px; }
.content-section { background: var(--card); border-radius: var(--radius); padding: 40px; margin: 20px 0; box-shadow: 0 4px 40px rgba(0,0,0,0.04); border: 1px solid rgba(210,210,215,0.4); }
.content-section h2 { font-size: 26px; font-weight: 700; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
.content-section h3 { font-size: 20px; font-weight: 600; margin: 32px 0 16px; color: var(--accent); }
.content-section p { font-size: 16px; margin-bottom: 16px; }
.content-section ul, .content-section ol { margin: 16px 0; padding-left: 24px; }
.content-section li { font-size: 16px; margin-bottom: 12px; }
.day-plan { background: #f5f5f7; border-radius: 14px; padding: 20px 24px; margin: 16px 0; }
.day-plan h4 { font-size: 17px; font-weight: 600; margin-bottom: 8px; color: var(--accent); }
.day-plan p { font-size: 14px; color: var(--text-secondary); margin: 0; }
.tip-box { background: #d1ecf1; border-left: 4px solid var(--accent); padding: 16px 20px; border-radius: 8px; margin: 20px 0; }
.tip-box strong { color: var(--accent); }
.warn-box { background: #fff3cd; border-left: 4px solid #ffc107; padding: 16px 20px; border-radius: 8px; margin: 20px 0; }
.warn-box strong { color: #856404; }
.update-log { background: var(--card); border-radius: var(--radius); padding: 30px; margin: 20px 0; box-shadow: 0 4px 40px rgba(0,0,0,0.04); border: 1px solid rgba(210,210,215,0.4); }
.update-log h3 { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
.update-log .log-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
.update-log .log-item:last-child { border-bottom: none; }
.update-log .log-item .date { font-size: 13px; color: var(--text-secondary); }
.update-log .log-item .text { font-size: 15px; margin-top: 4px; }
footer { text-align: center; padding: 60px 0 40px; color: var(--text-secondary); font-size: 13px; }
@media (max-width: 768px) {
header h1 { font-size: 32px; }
.content-section { padding: 24px; }
}


);
})();
</script>
</body>
<!-- v6 theme fix -->
</html>
