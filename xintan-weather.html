<script>(function(){try{var t=localStorage.getItem('theme');if(t==='light'||t==='dark'){document.documentElement.setAttribute('data-theme',t)}else{var h=new Date().getHours();document.documentElement.setAttribute('data-theme',(h>=6&&h<18)?'light':'dark')}}catch(e){}})();</script>
<link rel="stylesheet" href="css/style.css">
<style>
/* ===== 页面基础（老年人友好字体） ===== */
body { font-size: 17px !important; }
.container { font-size: 17px !important; }
.navbar { font-size: 16px !important; }

/* ===== 页面顶部横幅 ===== */
.xw-banner {
  text-align: center;
  padding: 28px 20px 20px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(135deg, rgba(201,168,76,0.08) 0%, rgba(201,168,76,0.02) 100%);
}
[data-theme="light"] .xw-banner { background: linear-gradient(135deg, rgba(201,168,76,0.06) 0%, rgba(201,168,76,0.01) 100%); }
.xw-banner-icon { font-size: 3.5rem; margin-bottom: 10px; }
.xw-banner-title { font-size: 1.6rem; font-weight: 900; color: var(--gold); letter-spacing: 1px; }
[data-theme="light"] .xw-banner-title { color: #6B4F00; }
.xw-banner-sub { font-size: 1rem; color: var(--text-muted); margin-top: 6px; }
.xw-banner-coord { font-size: 0.85rem; color: var(--text-muted); margin-top: 4px; opacity: 0.7; }

/* ===== 加载动画 ===== */
.xw-loading {
  display: flex; justify-content: center; align-items: center; gap: 10px;
  padding: 80px 0; color: var(--text-muted); font-size: 1.1rem;
}
.xw-dot {
  width: 10px; height: 10px; border-radius: 50%; background: var(--gold);
  animation: xwPulse 1.2s ease-in-out infinite;
}
.xw-dot:nth-child(2){ animation-delay: 0.2s; }
.xw-dot:nth-child(3){ animation-delay: 0.4s; }
@keyframes xwPulse {
  0%,100% { opacity: 0.2; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.3); }
}

/* ===== 当前天气大卡（老年人重点阅读区） ===== */
.xw-current {
  padding: 24px 20px;
  display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
}
.xw-cur-icon { font-size: 5rem; line-height: 1; flex-shrink: 0; }
.xw-cur-info { flex: 1; min-width: 140px; }
.xw-cur-name { font-size: 1.6rem; font-weight: 700; color: var(--text); }
.xw-cur-time { font-size: 0.9rem; color: var(--text-muted); margin-top: 4px; }
.xw-cur-temp {
  font-size: 5rem; font-weight: 900; line-height: 1; letter-spacing: -3px; color: var(--text);
}
.xw-cur-temp span { font-size: 2rem; font-weight: 400; color: var(--text-secondary); }

/* ===== 数据网格 ===== */
.xw-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
  padding: 0 20px 20px;
}
.xw-item {
  background: var(--bg); border-radius: 14px; padding: 14px 8px; text-align: center;
  border: 1px solid var(--border);
}
[data-theme="light"] .xw-item { background: rgba(0,0,0,0.03); }
.xw-item-label { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 4px; font-weight: 600; }
.xw-item-val { font-size: 1.15rem; font-weight: 700; color: var(--text); line-height: 1.2; }
.xw-item-sub { font-size: 0.8rem; color: var(--text-secondary); margin-top: 2px; }

/* ===== 分区标题 ===== */
.xw-section {
  padding: 20px 20px 10px;
  font-size: 1rem; font-weight: 700; color: var(--text-muted);
  border-top: 1px solid var(--border);
  letter-spacing: 0.5px;
  display: flex; align-items: center; gap: 8px;
}

/* ===== 3日预报 ===== */
.xw-forecast {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
  padding: 0 20px 20px;
}
.xw-day {
  background: var(--bg); border-radius: 16px; padding: 18px 12px; text-align: center;
  border: 2px solid var(--border); transition: border-color 0.15s;
}
[data-theme="light"] .xw-day { background: rgba(0,0,0,0.03); }
.xw-day:hover { border-color: var(--gold); }
.xw-day-label { font-size: 1rem; font-weight: 700; color: var(--text-secondary); margin-bottom: 8px; }
.xw-day-icon { font-size: 2.5rem; margin-bottom: 6px; }
.xw-day-temp { font-size: 1.7rem; font-weight: 900; color: var(--text); line-height: 1.2; }
.xw-day-temp span { font-size: 1.1rem; font-weight: 400; color: var(--text-secondary); }
.xw-day-desc { font-size: 0.85rem; color: var(--text-muted); margin-top: 4px; line-height: 1.5; }
.xw-day-tags { display: flex; gap: 5px; justify-content: center; flex-wrap: wrap; margin-top: 8px; }
.xw-tag {
  font-size: 0.8rem; padding: 3px 9px; border-radius: 10px;
  background: rgba(201,168,76,0.12); color: var(--gold); font-weight: 700; white-space: nowrap;
}
[data-theme="light"] .xw-tag { background: rgba(139,105,20,0.1); color: #6B4F00; }

/* ===== 24小时逐时预报 ===== */
.xw-hourly {
  display: flex; gap: 0; overflow-x: auto; padding: 0 20px 20px;
  -webkit-overflow-scrolling: touch; scrollbar-width: none;
}
.xw-hourly::-webkit-scrollbar { display: none; }
.xw-h-item {
  flex-shrink: 0; width: 64px; text-align: center; padding: 10px 4px;
  border-right: 1px solid var(--border); font-size: 0.8rem;
}
.xw-h-item:last-child { border-right: none; }
.xw-h-day-start { 
  position: relative;
  border-left: 2px solid var(--gold);
  padding-left: 6px;
}
.xw-h-day-badge {
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--gold);
  margin-bottom: 4px;
  letter-spacing: 0.5px;
  white-space: nowrap;
}
.xw-h-time { color: var(--text-muted); font-weight: 700; margin-bottom: 5px; font-size: 0.85rem; }
.xw-h-icon { font-size: 1.5rem; margin-bottom: 4px; }
.xw-h-temp { font-weight: 700; color: var(--text); font-size: 1rem; }
.xw-h-rain { color: var(--blue); font-size: 0.75rem; margin-top: 2px; }

/* ===== 灾害预警（醒目高亮） ===== */
.xw-alert { margin: 0 20px 20px; border-radius: 14px; overflow: hidden; }
.xw-alert-item {
  border-radius: 12px; padding: 14px 16px; margin-bottom: 8px;
  font-size: 0.95rem; display: flex; flex-direction: column; gap: 4px;
}
.xw-alert-danger {
  background: rgba(220,50,50,0.15); border-left: 5px solid #dc3232;
}
[data-theme="light"] .xw-alert-danger { background: rgba(220,50,50,0.10); }
.xw-alert-warn {
  background: rgba(255,140,0,0.12); border-left: 5px solid #ff8c00;
}
[data-theme="light"] .xw-alert-warn { background: rgba(255,140,0,0.08); }
.xw-alert-type { font-weight: 700; color: #ff8c00; font-size: 1.05rem; }
[data-theme="light"] .xw-alert-type { color: #c05000; }
.xw-alert-msg { color: var(--text-secondary); font-size: 0.9rem; line-height: 1.6; }

/* ===== 田间作业指导 ===== */
.xw-guide { padding: 0 20px 20px; }
.xw-guide-card {
  background: var(--bg); border-radius: 16px; padding: 18px 20px;
  border: 2px solid var(--border); border-left: 5px solid var(--green);
}
[data-theme="light"] .xw-guide-card { background: rgba(0,0,0,0.03); }
.xw-guide-title { font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 10px; }
.xw-guide-text { font-size: 1rem; color: var(--text-secondary); line-height: 1.8; margin-bottom: 12px; padding: 12px 14px; background: var(--bg); border-radius: 10px; border-left: 3px solid var(--green); }
.xw-copy-btn {
  display: block; width: 100%; padding: 14px; border-radius: 12px;
  background: rgba(201,168,76,0.12); border: 2px solid rgba(201,168,76,0.30);
  color: var(--gold); font-size: 1.05rem; font-weight: 700;
  cursor: pointer; transition: background 0.15s; text-align: center;
}
.xw-copy-btn:active { background: rgba(201,168,76,0.22); }

/* ===== 农事日历提示 ===== */
.xw-calendar { padding: 0 20px 28px; }
.xw-cal-card {
  background: var(--bg); border-radius: 16px; padding: 16px 18px;
  border: 1px solid var(--border);
}
[data-theme="light"] .xw-cal-card { background: rgba(0,0,0,0.03); }
.xw-cal-title { font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 10px; }
.xw-cal-row {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 0; font-size: 0.9rem; color: var(--text-secondary); line-height: 1.6;
  border-bottom: 1px solid var(--border);
}
.xw-cal-row:last-child { border-bottom: none; }
.xw-cal-icon { flex-shrink: 0; font-size: 1.2rem; }
.xw-cal-label { font-weight: 700; color: var(--text); min-width: 70px; }

/* ===== 响应式 ===== */
@media (max-width: 480px) {
  .xw-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .xw-forecast { gap: 8px; }
  .xw-cur-temp { font-size: 4rem; }
  .xw-cur-icon { font-size: 4rem; }
  .xw-day-temp { font-size: 1.4rem; }
  .xw-day-icon { font-size: 2rem; }
}
</style>

<script>
(function(){
  // ===== 新坍镇经纬度 =====
  var LAT=33.76, LON=120.09;
  var codes={0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',71:'🌨️',73:'🌨️',75:'❄️',77:'🌨️',80:'🌦️',81:'🌧️',82:'⛈️',85:'🌨️',86:'🌨️',95:'⛈️',96:'⛈️',99:'⛈️'};
  var names={0:'晴',1:'晴间多云',2:'多云',3:'阴',45:'雾',48:'冻雾',51:'小毛毛雨',53:'毛毛雨',55:'大毛毛雨',61:'小雨',63:'中雨',65:'大雨',71:'小雪',73:'中雪',75:'大雪',77:'雨夹雪',80:'阵雨',81:'阵雨中雨',82:'大阵雨',85:'雨夹雪',86:'大阵雪',95:'雷暴',96:'雷阵雨',99:'强雷暴'};
  var windDirs=['北','北偏东','东北','东偏北','东','东偏南','东南','南偏东','南','南偏西','西南','西偏南','西','西偏北','西北','北偏西'];

  var url='https://api.open-meteo.com/v1/forecast'
    +'?latitude='+LAT+'&longitude='+LON
    +'&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m'
    +'&hourly=temperature_2m,precipitation_probability,weather_code'
    +'&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,weather_code,sunrise,sunset'
    +'&timezone=Asia/Shanghai&forecast_days=3';

  fetch(url).then(function(r){return r.json();}).then(function(d){
    var c=d.current, h=d.hourly, daily=d.daily;
    var now=new Date(), hourIdx=now.getHours();
    var icon=codes[c.weather_code]||'🌡️', name=names[c.weather_code]||'未知';
    var t=Math.round(c.temperature_2m), fl=Math.round(c.apparent_temperature);
    var wind=Math.round(c.wind_speed_10m||0);
    var hum=c.relative_humidity_2m||0, rain=c.precipitation||0;
    var isDay=true; // 简化：默认白天

    // ===== 灾害检测 =====
    var alerts=[];
    if(rain>25) alerts.push({t:'🌧️ 暴雨',m:'当前降水量'+rain+'mm，请检查田间排水通畅，低洼田块及时排涝',l:'danger'});
    else if(rain>=10) alerts.push({t:'🌧️ 中到大雨',m:'注意清沟理墒，防止作物受淹',l:'warn'});
    if(wind>=50) alerts.push({t:'🌬️ 强风/大风',m:'请固定大棚支架、收拢薄膜，严防作物倒伏',l:'danger'});
    else if(wind>=25) alerts.push({t:'🌬️ 大风',m:'注意大棚薄膜撕裂，露天作物防倒伏',l:'warn'});
    var todayMin=daily.temperature_2m_min[0];
    if(todayMin<2) alerts.push({t:'❄️ 霜冻/低温',m:'气温接近冰点，覆盖作物保温（加盖草帘），防止冻害',l:'danger'});
    else if(todayMin<5) alerts.push({t:'❄️ 低温预警',m:'夜间保温，大棚加盖内膜或保温被',l:'warn'});
    if(c.weather_code>=95) alerts.push({t:'⛈️ 雷暴',m:'避免户外作业，切断露天地头电源，注意人员安全',l:'danger'});
    var rainyDays=0; for(var di=0;di<3;di++) if(daily.precipitation_sum[di]>1) rainyDays++;
    if(rainyDays>=3) alerts.push({t:'🌧️ 连续阴雨',m:'未来3天多阴雨，关注排水，防治纹枯病/白粉病蔓延',l:'warn'});

    // ===== 3日预报HTML =====
    var fcTags=['今天','明天','后天'];
    var fcHtml='';
    for(var di=0;di<3;di++){
      var dmax=Math.round(daily.temperature_2m_max[di]);
      var dmin=Math.round(daily.temperature_2m_min[di]);
      var dwc=daily.weather_code[di], dp=Math.round(daily.precipitation_sum[di]);
      var dname=names[dwc]||'未知';
      var tags=[];
      if(dwc>=95) tags.push('防雷');
      if(dp>15) tags.push('防涝');
      if(dmin<5) tags.push('防霜');
      if(dwc<=3&&dmax>25) tags.push('打药');
      if(dwc===0&&dp===0) tags.push('晾晒');
      if(dwc<=1&&dmax>=20&&dmax<=30) tags.push('施肥');
      if(tags.length===0) tags.push('田间管理');
      var tagsHtml=tags.slice(0,3).map(function(x){return '<span class="xw-tag">'+x+'</span>';}).join('');
      var isToday=di===0?'border-color:var(--gold);':'';
      fcHtml+='<div class="xw-day" style="'+isToday+'">'+
        '<div class="xw-day-label">'+fcTags[di]+'</div>'+
        '<div class="xw-day-icon">'+(codes[dwc]||'🌡️')+'</div>'+
        '<div class="xw-day-temp">'+dmax+'°<span>/'+dmin+'°</span></div>'+
        '<div class="xw-day-desc">'+dname+' · 降水'+dp+'mm</div>'+
        '<div class="xw-day-tags">'+tagsHtml+'</div></div>';
    }

    // ===== 24小时逐时预报（带日期标签）=====
    var hourlyHtml='';
    var nowDate=new Date(); nowDate.setHours(0,0,0,0);
    var todayStr=nowDate.toISOString().slice(0,10);
    var tomorrowDate=new Date(nowDate); tomorrowDate.setDate(tomorrowDate.getDate()+1);
    var tomorrowStr=tomorrowDate.toISOString().slice(0,10);
    var dayAfterDate=new Date(nowDate); dayAfterDate.setDate(dayAfterDate.getDate()+2);
    var dayAfterStr=dayAfterDate.toISOString().slice(0,10);
    var lastDateStr='';
    // 确保hourly数组存在且够长
    if(!h.temperature_2m||!h.weather_code){
      hourlyHtml='<div style="padding:16px;color:var(--text-muted)">数据加载中...</div>';
    } else {
      for(var hi=0;hi<24;hi++){
        var realIdx=hourIdx+hi;
        if(realIdx>=h.temperature_2m.length) break;
        var hIcon=codes[h.weather_code[realIdx]]||'🌡️';
        var hTemp=Math.round(h.temperature_2m[realIdx]);
        var hRain=h.precipitation_probability[realIdx]||0;
        var currentDateStr=todayStr;
        if(h.time&&h.time[realIdx]){
          var ct=h.time[realIdx];
          if(ct) currentDateStr=ct.slice(0,10);
        }
        var dayLabel='';
        if(currentDateStr!==lastDateStr){
          if(currentDateStr===todayStr) dayLabel='今天';
          else if(currentDateStr===tomorrowStr) dayLabel='明天';
          else if(currentDateStr===dayAfterStr) dayLabel='后天';
          else dayLabel=currentDateStr.slice(5);
        }
        lastDateStr=currentDateStr;
        var displayHour=(hourIdx+hi)%24;
        var hTime=displayHour<10?'0'+displayHour+':00':displayHour+':00';
        if(hi===0) hTime='现在';
        var dayClass=dayLabel?' xw-h-day-start':'';
        var dayBadge=dayLabel?'<div class="xw-h-day-badge">'+dayLabel+'</div>':'';
        hourlyHtml+='<div class="xw-h-item'+dayClass+'">'+
          dayBadge+
          '<div class="xw-h-time">'+hTime+'</div>'+
          '<div class="xw-h-icon">'+hIcon+'</div>'+
          '<div class="xw-h-temp">'+hTemp+'°</div>'+
          (hRain>20?'<div class="xw-h-rain">💧'+hRain+'%</div>':'')+
        '</div>';
      }
    }

    // ===== 灾害预警HTML =====
    var alertHtml='';
    if(alerts.length>0){
      alertHtml='<div class="xw-section">⚠️ 风险提示</div><div class="xw-alert">'+
        alerts.map(function(a){
          return '<div class="xw-alert-item xw-alert-'+a.l+'"><span class="xw-alert-type">'+a.t+'</span><span class="xw-alert-msg">'+a.m+'</span></div>';
        }).join('')+'</div>';
    }

    // ===== 田间作业指导 =====
    var month=now.getMonth()+1;
    var gt='';
    if(month>=5&&month<=6){
      if(daily.precipitation_sum[0]>5) gt={d:'🌾【小麦收割】今日有雨，不宜收割！提前检查收割机，利用停雨间隙抢收，及时烘干防霉变。',c:'🌾【小麦收割】今日有雨，不宜收割！提前检查收割机，利用停雨间隙抢收，及时烘干防霉变。'};
      else if(daily.precipitation_sum[0]===0&&hum<70) gt={d:'🌾【小麦收割】今日适宜收割！建议上午10点后开始，露水干透再下地，割茬15-20cm，及时晾晒。',c:'🌾【小麦收割】今日适宜收割！建议上午10点后开始，露水干透再下地，割茬15-20cm，及时晾晒。'};
      else gt={d:'🌾【小麦收割期】关注天气，抢收抢晒。小麦蜡熟末期为最佳收获期，籽粒含水量≤20%即可机械收割。',c:'🌾【小麦收割期】关注天气，抢收抢晒。小麦蜡熟末期为最佳收获期，籽粒含水量≤20%即可机械收割。'};
    } else if(month>=3&&month<=4){
      if(t>=12&&daily.precipitation_sum[0]>0) gt={d:'🌱【水稻育秧】温湿度适宜，抓紧播种！注意秧田水深，晴天勤通风炼苗，防止秧苗徒长。',c:'🌱【水稻育秧】温湿度适宜，抓紧播种！注意秧田水深，晴天勤通风炼苗，防止秧苗徒长。'};
      else gt={d:'🌱【春播期】日均气温稳定通过12℃即可播种水稻。提前整地施肥，做好种子催芽，关注倒春寒。',c:'🌱【春播期】日均气温稳定通过12℃即可播种水稻。提前整地施肥，做好种子催芽，关注倒春寒。'};
    } else if(month>=7&&month<=8){
      if(t>=35) gt={d:'🌾【高温热害】气温'+t+'°C！日灌夜排降低田间温度，增施叶面肥（磷酸二氢钾），防止高温逼熟。',c:'🌾【高温热害】气温'+t+'°C！日灌夜排降低田间温度，增施叶面肥（磷酸二氢钾），防止高温逼熟。'};
      else gt={d:'🌾【水稻管理】加强田间肥水管理，烤田控蘖，防治稻瘟病、纹枯病。注意高温时段避免下田。',c:'🌾【水稻管理】加强田间肥水管理，烤田控蘖，防治稻瘟病、纹枯病。注意高温时段避免下田。'};
    } else if(month>=9&&month<=10){
      gt={d:'🚜【秋收秋播】密切关注天气预报，确保水稻、玉米及时收获。收获后趁墒播种小麦，争取一播全苗。',c:'🚜【秋收秋播】密切关注天气预报，确保水稻、玉米及时收获。收获后趁墒播种小麦，争取一播全苗。'};
    } else if(month>=11||month<=2){

      else gt={d:'❄️【越冬期】做好清沟理墒，趁晴天追施腊肥，提高作物抗寒能力。检查农机具，备足来年春耕物资。',c:'❄️【越冬期】做好清沟理墒，趁晴天追施腊肥，提高作物抗寒能力。检查农机具，备足来年春耕物资。'};
    } else {
      gt={d:'🌿【日常管理】加强田间巡查，关注墒情变化，合理追肥打药，晴天及时防治病虫害。',c:'🌿【日常管理】加强田间巡查，关注墒情变化，合理追肥打药，晴天及时防治病虫害。'};
    }

    // ===== 农事日历 =====
    var calHtml='';
    var seasonName='';
    var seasonItems=[];
    if(month>=3&&month<=4){ seasonName='🌱 春播期'; seasonItems=[{i:'🌱',l:'水稻育秧',d:'日均温≥12℃播种'},{i:'🚜',l:'整地施肥',d:'提前翻耕施底肥'},{i:'❄️',l:'防倒春寒',d:'关注低温预警'}]; }
    else if(month>=5&&month<=6){ seasonName='🌾 夏收夏种期'; seasonItems=[{i:'🌾',l:'小麦收割',d:'蜡熟末期抢收'},{i:'🌱',l:'水稻插秧',d:'收麦后及时移栽'},{i:'🌧️',l:'防汛排涝',d:'梅雨季清沟理墒'}]; }
    else if(month>=7&&month<=8){ seasonName:'☀️ 夏管期'; seasonItems=[{i:'🌾',l:'水稻管理',d:'烤田控蘖防病害'},{i:'🌡️',l:'防高温',d:'日灌夜排降温'},{i:'🐛',l:'病虫害',d:'防治稻瘟/纹枯病'}]; }
    else if(month>=9&&month<=10){ seasonName='🚜 秋收秋播期'; seasonItems=[{i:'🚜',l:'水稻收获',d:'适时收割晾晒'},{i:'🌱',l:'小麦播种',d:'趁墒抢播'},{i:'🌧️',l:'防秋雨',d:'关注连阴雨'}]; }
    else { seasonName='❄️ 越冬期'; seasonItems=[{i:'❄️',l:'防寒保温',d:'覆盖/镇压保墒'},{i:'🌿',l:'追施腊肥',d:'趁晴天施用'},{i:'🚜',l:'农机检修',d:'备春耕物资'}]; }
    calHtml='<div class="xw-section">📅 当前农事季节：'+seasonName+'</div><div class="xw-calendar"><div class="xw-cal-card">';

      calHtml+='<div class="xw-cal-row"><span class="xw-cal-icon">'+s.i+'</span><span class="xw-cal-label">'+s.l+'</span><span>'+s.d+'</span></div>';
    }

    // ===== 组装页面 =====
    var html=
      '<div class="xw-current">'+
        '<div class="xw-cur-icon">'+icon+'</div>'+

        '<div class="xw-item"><div class="xw-item-label">💧 相对湿度</div><div class="xw-item-val">'+hum+'%</div></div>'+
        '<div class="xw-item"><div class="xw-item-label">🌬️ 风速</div><div class="xw-item-val">'+wind+'km/h</div></div>'+

        '<div class="xw-item"><div class="xw-item-label">⬇️ 今日最低</div><div class="xw-item-val" style="color:#1565c0">'+Math.round(daily.temperature_2m_min[0])+'°C</div></div>'+
        '<div class="xw-item"><div class="xw-item-label">🌅 日出/日落</div><div class="xw-item-val" style="font-size:0.7rem">'+(daily.sunrise[0]||'').slice(11,16)+'/'+(daily.sunset[0]||'').slice(11,16)+'</div></div>'+
      '</div>'+

      '<div class="xw-section">🕐 24小时逐时预报</div>'+
      '<div class="xw-hourly">'+hourlyHtml+'</div>'+

      '<div class="xw-section">📅 3日天气预报</div>'+
      '<div class="xw-forecast">'+fcHtml+'</div>'+

      alertHtml+

      '<div class="xw-guide"><div class="xw-guide-card">'+

      '</div></div>'+

      calHtml;

    document.getElementById('xwLoading').style.display='none';
    var contentEl=document.getElementById('xwContent');
    contentEl.style.display='block';
    contentEl.innerHTML=html;
  }).catch(function(){
    document.getElementById('xwLoading').innerHTML='<div style="text-align:center;color:var(--text-muted);padding:40px">天气数据加载失败，请稍后刷新重试</div>';
  });
})();

function xwCopy(){
  var src=document.getElementById('xwCopySrc');
  if(!src)return;
  var text=src.value;
  var btn=document.querySelector('.xw-copy-btn');
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){
      btn.textContent='✅ 已复制';
      setTimeout(function(){btn.textContent='📋 一键复制';},2000);
    });
  } else {
    var ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;left:-9999px';
    document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    btn.textContent='✅ 已复制';setTimeout(function(){btn.textContent='📋 一键复制';},2000);
  }
}
</script>
