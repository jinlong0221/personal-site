<!DOCTYPE html>
<html lang="zh-CN>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
<title>熊胆 - 龙兄知识库</title>
<style>* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --bg: #0a0a0a; --text: #ffffff; --text2: #b0b0b0; --text3: #888; --border: #333; --card: #141414; }
body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; }
.container { max-width: 900px; margin: 0 auto; padding: 0 16px; }
.navbar { position: sticky; top: 0; z-index: 200; background: var(--bg); border-bottom: 1px solid var(--border); }
.navbar-inner { max-width: 900px; margin: 0 auto; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
.logo { font-family: 'Ma Shan Zheng', cursive; font-size: 26px; color: #fff; text-decoration: none; }
.back { color: var(--text3); text-decoration: none; font-size: 14px; font-weight: 600; }
.back:hover { color: #fff; }
header { padding: 36px 0 28px; border-bottom: 1px solid var(--border); }
header .emoji { font-size: 52px; margin-bottom: 10px; }
header h1 { font-size: 34px; font-weight: 900; margin-bottom: 10px; }
header p { font-size: 15px; color: var(--text2); }
.card { background: var(--card); border: 1px solid var(--border); padding: 24px; margin: 16px 0; }
.card h2 { font-size: 18px; font-weight: 900; margin-bottom: 14px; color: var(--text); border-left: 4px solid var(--accent, #6b69d6); padding-left: 12px; }
.card p, .card li { font-size: 14px; color: var(--text2); margin-bottom: 8px; }
.card ul { padding-left: 20px; }
.card li { margin-bottom: 6px; }
.tag-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.tag { font-size: 11px; font-weight: 700; padding: 4px 10px; background: rgba(107,105,214,0.15); color: #9b99e0; }
.warning { background: rgba(232,17,35,0.1); border-color: rgba(232,17,35,0.3); padding: 12px 16px; margin: 12px 0; font-size: 13px; color: #ff6b6b; }
footer { text-align: center; padding: 40px 0 30px; color: var(--text3); font-size: 12px; border-top: 1px solid var(--border); margin-top: 20px; }

</html>
